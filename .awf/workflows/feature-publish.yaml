# Feature Publish Workflow
# Creates a GitHub issue from a previously generated spec file.
# Run feature-spec first to generate the spec.
#
# Usage: awf run feature-publish --input spec_file=.specify/specs/F038.json

name: feature-publish
description: Create GitHub issue from generated spec
version: "1.0.0"
author: awf

inputs:
  - name: spec_file
    type: string
    description: Path to spec JSON file (e.g., .specify/specs/F038.json)
    required: true

  - name: version
    type: string
    description: Target version for labels (e.g., v0.2.0)
    required: true
    validation:
      pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"

states:
  initial: load_spec

  load_spec:
    type: step
    description: Load spec from JSON file
    command: cat {{.inputs.spec_file}}
    timeout: 5s
    capture:
      stdout: spec_json
    on_success: create_github_issue
    on_failure: error_load
    hooks:
      pre:
        - log: "Loading spec from {{.inputs.spec_file}}..."

  create_github_issue:
    type: step
    description: Create GitHub issue for the feature
    command: |
      SPEC_JSON=$(cat << 'JSONEOF'
      {{.states.load_spec.Output}}
      JSONEOF
      )

      # Extract content from JSON
      CONTENT=$(echo "$SPEC_JSON" | jq -r '.content // empty')
      if [ -z "$CONTENT" ]; then
        echo "ERROR: No content in spec JSON" >&2
        exit 1
      fi

      # Extract title from first line of content
      TITLE=$(echo "$CONTENT" | head -1 | sed 's/^# //')
      if [ -z "$TITLE" ]; then
        echo "ERROR: No title found in spec" >&2
        exit 1
      fi

      # Get body (skip title line)
      SPEC_BODY=$(echo "$CONTENT" | tail -n +2)

      # Build issue body with footer
      BODY=$(printf '%s\n\n---\n_Created via awf run feature-publish_' "$SPEC_BODY")

      # Create issue and return URL (gh issue create outputs URL directly)
      gh issue create --repo vanoix/awf \
        --title "$TITLE" \
        --body "$BODY" \
        --label "feature,{{.inputs.version}}"
    timeout: 30s
    capture:
      stdout: issue_url
    on_success: add_to_project
    on_failure: error_issue
    hooks:
      pre:
        - log: "Creating GitHub issue..."
      post:
        - log: "Issue created: {{.states.create_github_issue.Output}}"

  add_to_project:
    type: step
    description: Add issue to GitHub Project with Status=Backlog
    command: |
      PROJECT_NUM=1
      ISSUE_URL="{{.states.create_github_issue.Output}}"

      # Add to project
      ITEM_ID=$(gh project item-add $PROJECT_NUM --owner vanoix \
        --url "$ISSUE_URL" --format json | jq -r '.id')

      if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
        echo "FAILED_TO_ADD"
        exit 0
      fi

      # Get project and field IDs
      PROJECT_ID=$(gh project view $PROJECT_NUM --owner vanoix --format json | jq -r '.id')
      FIELDS=$(gh project field-list $PROJECT_NUM --owner vanoix --format json)

      STATUS_FIELD=$(echo "$FIELDS" | jq -r '.fields[] | select(.name=="Status") | .id')
      BACKLOG_OPT=$(echo "$FIELDS" | jq -r '.fields[] | select(.name=="Status") | .options[] | select(.name=="Backlog") | .id')
      VERSION_FIELD=$(echo "$FIELDS" | jq -r '.fields[] | select(.name=="Version") | .id')
      VERSION_OPT=$(echo "$FIELDS" | jq -r ".fields[] | select(.name==\"Version\") | .options[] | select(.name==\"{{.inputs.version}}\") | .id")

      # Set Status to Backlog
      if [ -n "$STATUS_FIELD" ] && [ -n "$BACKLOG_OPT" ]; then
        gh project item-edit --id "$ITEM_ID" --project-id "$PROJECT_ID" \
          --field-id "$STATUS_FIELD" --single-select-option-id "$BACKLOG_OPT" 2>/dev/null || true
      fi

      # Set Version
      if [ -n "$VERSION_FIELD" ] && [ -n "$VERSION_OPT" ]; then
        gh project item-edit --id "$ITEM_ID" --project-id "$PROJECT_ID" \
          --field-id "$VERSION_FIELD" --single-select-option-id "$VERSION_OPT" 2>/dev/null || true
      fi

      echo "ADDED_TO_PROJECT"
    timeout: 60s
    capture:
      stdout: project_result
    on_success: done
    on_failure: done
    hooks:
      pre:
        - log: "Adding to GitHub Project..."
      post:
        - log: "Project: {{.states.add_to_project.Output}}"

  #==========================================================================
  # TERMINAL STATES
  #==========================================================================

  done:
    type: terminal
    status: success
    message: |
      ╔════════════════════════════════════════════════════════════════════╗
      ║                    FEATURE PUBLISHED                               ║
      ╠════════════════════════════════════════════════════════════════════╣
      ║                                                                    ║
      ║  Issue: {{.states.create_github_issue.Output}}                     ║
      ║  Project: {{.states.add_to_project.Output}}                        ║
      ║                                                                    ║
      ╚════════════════════════════════════════════════════════════════════╝

  error_load:
    type: terminal
    status: failure
    message: "Failed to load spec file: {{.inputs.spec_file}}"

  error_issue:
    type: terminal
    status: failure
    message: "Failed to create GitHub issue"

hooks:
  workflow_start:
    - log: "=== Publishing feature from {{.inputs.spec_file}} ==="
  workflow_end:
    - log: "=== Feature publish completed in {{.workflow.Duration}} ==="
  workflow_error:
    - log: "=== Feature publish failed: {{.error.Message}} ==="
