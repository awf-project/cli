# Feature Creation Workflow
# Generates a feature spec using Claude and creates a GitHub issue with the full content.
#
# Usage: awf run feature --input feature_id=F038 --input version=v0.2.0 --input description="Add retry logic"

name: feature
description: Generate feature spec and create GitHub issue
version: "1.0.0"
author: awf

inputs:
  - name: feature_id
    type: string
    description: Feature ID (e.g., F038)
    required: true
    validation:
      pattern: "^F[0-9]{3}$"

  - name: version
    type: string
    description: Target version (e.g., v0.2.0)
    required: true
    validation:
      pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"

  - name: description
    type: string
    description: Feature description
    required: true

states:
  initial: read_template

  #==========================================================================
  # PHASE 1: SPEC GENERATION
  #==========================================================================

  read_template:
    type: step
    description: Read feature template
    command: cat docs/plans/features/TEMPLATE.md
    timeout: 5s
    capture:
      stdout: template_content
    on_success: generate_spec
    on_failure: error_template
    hooks:
      pre:
        - log: "Reading feature template..."

  generate_spec:
    type: step
    description: Generate feature spec using Claude
    command: |
      claude -p "$(cat .awf/prompts/feature/spec-generation.md)" \
        --allowedTools "Read,Grep,Glob" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 180s
    capture:
      stdout: spec_raw
      max_size: 1MB
    on_success: extract_spec
    on_failure: error_generation
    hooks:
      pre:
        - log: "Claude generating feature spec..."

  extract_spec:
    type: step
    description: Extract spec JSON from Claude response
    command: |
      # Extract .result from Claude JSON output, then parse embedded JSON
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.generate_spec.Output}}
      JSONEOF
      )

      # Try to extract .result and parse it as JSON
      RESULT=$(echo "$CLAUDE_OUTPUT" | jq -r '.result // empty')

      if [ -z "$RESULT" ]; then
        echo "ERROR: No result in Claude output" >&2
        exit 1
      fi

      # Strip markdown code fences if present (```json ... ```)
      RESULT=$(echo "$RESULT" | sed 's/^```json//; s/^```//; s/```$//' | sed '/^$/d')

      # Check if result is valid JSON with required fields
      if echo "$RESULT" | jq -e '.slug and .content' > /dev/null 2>&1; then
        echo "$RESULT"
      else
        # Try to extract JSON object from text (handles extra whitespace/text around JSON)
        JSON_MATCH=$(echo "$RESULT" | grep -oP '\{.*"slug".*"content".*\}' | head -1)
        if [ -n "$JSON_MATCH" ] && echo "$JSON_MATCH" | jq -e '.slug and .content' > /dev/null 2>&1; then
          echo "$JSON_MATCH"
        else
          echo "ERROR: Invalid JSON format - missing slug or content" >&2
          echo "Raw result: $RESULT" >&2
          exit 1
        fi
      fi
    timeout: 10s
    capture:
      stdout: spec_json
    on_success: create_github_issue
    on_failure: error_generation

  #==========================================================================
  # PHASE 2: GITHUB INTEGRATION
  #==========================================================================

  create_github_issue:
    type: step
    description: Create GitHub issue for the feature
    command: |
      SPEC_JSON=$(cat << 'JSONEOF'
      {{.states.extract_spec.Output}}
      JSONEOF
      )

      # Extract content from JSON
      CONTENT=$(echo "$SPEC_JSON" | jq -r '.content // empty')
      if [ -z "$CONTENT" ]; then
        echo "ERROR: No content in spec JSON" >&2
        exit 1
      fi

      # Extract title from first line of content
      TITLE=$(echo "$CONTENT" | head -1 | sed 's/^# //')
      if [ -z "$TITLE" ]; then
        TITLE="{{.inputs.feature_id}}: {{.inputs.description}}"
      fi

      # Get body (skip title line)
      SPEC_BODY=$(echo "$CONTENT" | tail -n +2)

      # Build issue body
      BODY="$SPEC_BODY

---
_Created via awf run feature_"

      # Create issue and return URL (gh issue create outputs URL directly)
      gh issue create --repo vanoix/awf \
        --title "$TITLE" \
        --body "$BODY" \
        --label "feature,{{.inputs.version}}"
    timeout: 30s
    capture:
      stdout: issue_url
    on_success: add_to_project
    on_failure: summary
    hooks:
      pre:
        - log: "Creating GitHub issue..."
      post:
        - log: "Issue created: {{.states.create_github_issue.Output}}"

  add_to_project:
    type: step
    description: Add issue to GitHub Project with Status=Backlog
    command: |
      PROJECT_NUM=1
      ISSUE_URL="{{.states.create_github_issue.Output}}"

      # Add to project
      ITEM_ID=$(gh project item-add $PROJECT_NUM --owner vanoix \
        --url "$ISSUE_URL" --format json | jq -r '.id')

      if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
        echo "FAILED_TO_ADD"
        exit 0
      fi

      # Get project and field IDs
      PROJECT_ID=$(gh project view $PROJECT_NUM --owner vanoix --format json | jq -r '.id')
      FIELDS=$(gh project field-list $PROJECT_NUM --owner vanoix --format json)

      STATUS_FIELD=$(echo "$FIELDS" | jq -r '.fields[] | select(.name=="Status") | .id')
      BACKLOG_OPT=$(echo "$FIELDS" | jq -r '.fields[] | select(.name=="Status") | .options[] | select(.name=="Backlog") | .id')
      VERSION_FIELD=$(echo "$FIELDS" | jq -r '.fields[] | select(.name=="Version") | .id')
      VERSION_OPT=$(echo "$FIELDS" | jq -r ".fields[] | select(.name==\"Version\") | .options[] | select(.name==\"{{.inputs.version}}\") | .id")

      # Set Status to Backlog
      if [ -n "$STATUS_FIELD" ] && [ -n "$BACKLOG_OPT" ]; then
        gh project item-edit --id "$ITEM_ID" --project-id "$PROJECT_ID" \
          --field-id "$STATUS_FIELD" --single-select-option-id "$BACKLOG_OPT" 2>/dev/null || true
      fi

      # Set Version
      if [ -n "$VERSION_FIELD" ] && [ -n "$VERSION_OPT" ]; then
        gh project item-edit --id "$ITEM_ID" --project-id "$PROJECT_ID" \
          --field-id "$VERSION_FIELD" --single-select-option-id "$VERSION_OPT" 2>/dev/null || true
      fi

      echo "ADDED_TO_PROJECT"
    timeout: 60s
    capture:
      stdout: project_result
    on_success: summary
    on_failure: summary
    hooks:
      pre:
        - log: "Adding to GitHub Project..."
      post:
        - log: "Project: {{.states.add_to_project.Output}}"

  summary:
    type: step
    description: Generate workflow summary
    command: |
      echo "╔════════════════════════════════════════════════════════════════╗"
      echo "║              FEATURE CREATION COMPLETE                         ║"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Feature: {{.inputs.feature_id}}"
      echo "║ Version: {{.inputs.version}}"
      echo "║ Description: {{.inputs.description}}"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ GitHub:"
      echo "║   Issue: {{.states.create_github_issue.Output}}"
      echo "║   Project: {{.states.add_to_project.Output}}"
      echo "╚════════════════════════════════════════════════════════════════╝"
    timeout: 5s
    capture:
      stdout: summary_output
    on_success: done
    on_failure: done

  #==========================================================================
  # TERMINAL STATES
  #==========================================================================

  done:
    type: terminal
    status: success
    message: "Feature {{.inputs.feature_id}} created successfully"

  error_template:
    type: terminal
    status: failure
    message: "Failed to read feature template - ensure docs/plans/features/TEMPLATE.md exists"

  error_generation:
    type: terminal
    status: failure
    message: "Claude failed to generate feature spec"

hooks:
  workflow_start:
    - log: "=== Creating feature {{.inputs.feature_id}} for {{.inputs.version}} ==="
  workflow_end:
    - log: "=== Feature creation completed in {{.workflow.Duration}} ==="
  workflow_error:
    - log: "=== Feature creation failed: {{.error.Message}} ==="
