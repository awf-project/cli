# Feature Creation Workflow
# Creates a new feature spec, explores the codebase, and generates an implementation plan.
#
# Usage: awf run feature --input feature_id=F038 --input version=v0.2.0 --input description="Add retry logic"

name: feature
description: Create feature spec, explore codebase, and generate implementation plan
version: "1.0.0"
author: awf

inputs:
  - name: feature_id
    type: string
    description: Feature ID (e.g., F038)
    required: true
    validation:
      pattern: "^F[0-9]{3}$"

  - name: version
    type: string
    description: Target version (e.g., v0.2.0)
    required: true
    validation:
      pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"

  - name: description
    type: string
    description: Feature description
    required: true

states:
  initial: read_template

  #==========================================================================
  # PHASE 1: SPEC CREATION
  #==========================================================================

  read_template:
    type: step
    description: Read feature template
    command: cat docs/plans/features/TEMPLATE.md
    timeout: 5s
    capture:
      stdout: template_content
    on_success: generate_spec
    on_failure: error_template
    hooks:
      pre:
        - log: "Reading feature template..."

  generate_spec:
    type: step
    description: Generate feature spec using Claude
    command: |
      claude -p "Generate a feature specification for the awf project.

      ## Feature Info
      - ID: {{.inputs.feature_id}}
      - Version: {{.inputs.version}}
      - Description: {{.inputs.description}}

      ## Template to follow
      $(cat docs/plans/features/TEMPLATE.md)

      ## Naming convention
      Files are named: F0XX-feature-name-in-kebab-case.md
      Examples: F036-cli-init.md, F007-variable-interpolation.md, F029-output-streaming.md

      ## Instructions
      1. Fill in the template with appropriate content based on the description
      2. Set Status to 'planned'
      3. Set Version to {{.inputs.version}}
      4. Generate realistic acceptance criteria
      5. Leave Technical Tasks and Impacted Files with placeholders (will be filled after exploration)
      6. Generate a short kebab-case slug for the filename (2-4 words max)

      ## Output format (IMPORTANT)
      Output a JSON object with exactly this structure:
      {\"slug\": \"feature-name-slug\", \"content\": \"# F0XX: Title...\"}

      The slug should be lowercase, kebab-case, 2-4 words describing the feature.
      The content should be the full markdown spec.

      Output ONLY the JSON, no explanations." \
        --allowedTools "Read,Grep,Glob" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 180s
    capture:
      stdout: spec_raw
      max_size: 1MB
    on_success: extract_spec
    on_failure: error_generation
    hooks:
      pre:
        - log: "Claude generating feature spec..."

  extract_spec:
    type: step
    description: Extract spec JSON from Claude response
    command: |
      # Extract .result from Claude JSON output, then parse embedded JSON
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.generate_spec.Output}}
      JSONEOF
      )

      # Try to extract .result and parse it as JSON
      RESULT=$(echo "$CLAUDE_OUTPUT" | jq -r '.result // empty')

      if [ -z "$RESULT" ]; then
        echo "ERROR: No result in Claude output" >&2
        exit 1
      fi

      # Check if result is valid JSON with required fields
      if echo "$RESULT" | jq -e '.slug and .content' > /dev/null 2>&1; then
        echo "$RESULT"
      else
        # Claude may have returned text instead of JSON - try to extract JSON from text
        JSON_MATCH=$(echo "$RESULT" | grep -oP '\{[^{}]*"slug"[^{}]*"content"[^{}]*\}' | head -1)
        if [ -n "$JSON_MATCH" ] && echo "$JSON_MATCH" | jq -e '.slug and .content' > /dev/null 2>&1; then
          echo "$JSON_MATCH"
        else
          echo "ERROR: Invalid JSON format - missing slug or content" >&2
          echo "Raw result: $RESULT" >&2
          exit 1
        fi
      fi
    timeout: 10s
    capture:
      stdout: spec_json
    on_success: save_spec
    on_failure: error_generation

  save_spec:
    type: step
    description: Save feature spec to file
    command: |
      SPEC_JSON=$(cat << 'JSONEOF'
      {{.states.extract_spec.Output}}
      JSONEOF
      )

      # Extract slug with proper empty/null handling
      SLUG=$(echo "$SPEC_JSON" | jq -r 'if .slug == "" or .slug == null then "feature" else .slug end')

      # Sanitize slug: lowercase, replace spaces with dashes, remove invalid chars
      SLUG=$(echo "$SLUG" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9-]//g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

      # Final fallback if slug is still empty
      if [ -z "$SLUG" ]; then
        SLUG="feature"
      fi

      # Extract content
      CONTENT=$(echo "$SPEC_JSON" | jq -r 'if .content == "" or .content == null then "# No content generated" else .content end')

      SPEC_DIR="docs/plans/features/{{.inputs.version}}"
      mkdir -p "$SPEC_DIR"
      SPEC_FILE="$SPEC_DIR/{{.inputs.feature_id}}-${SLUG}.md"
      echo "$CONTENT" > "$SPEC_FILE"
      echo "$SPEC_FILE"
    timeout: 10s
    capture:
      stdout: spec_file_path
    on_success: explore_codebase
    on_failure: error_save
    hooks:
      pre:
        - log: "Saving spec file..."
      post:
        - log: "Spec saved to {{.states.save_spec.Output}}"

  #==========================================================================
  # PHASE 2: EXPLORATION
  #==========================================================================

  explore_codebase:
    type: step
    description: Claude explores codebase for implementation context
    command: |
      SPEC_CONTENT=$(cat "{{.states.save_spec.Output}}")
      claude -p "You are exploring the awf (AI Workflow CLI) codebase to understand how to implement a new feature.

      ## Feature to implement
      $SPEC_CONTENT

      ## Your Task
      1. Explore the codebase architecture (hexagonal: domain/application/infrastructure/interfaces)
      2. Find similar features already implemented as reference
      3. Identify key interfaces and types that will be affected
      4. List 3-5 critical files that must be modified or created

      Output a structured exploration report:
      - Architecture layer(s) involved
      - Critical files with reasons
      - Pattern files to follow
      - Dependencies and risks" \
        --allowedTools "Read,Grep,Glob" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 300s
    capture:
      stdout: exploration_raw
      max_size: 5MB
    on_success: parse_exploration
    on_failure: error_exploration
    hooks:
      pre:
        - log: "Claude exploring codebase..."
      post:
        - log: "Exploration complete"

  parse_exploration:
    type: step
    description: Extract exploration result and session ID
    command: |
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.explore_codebase.Output}}
      JSONEOF
      )

      # Try to parse as JSON, fallback to empty object
      if echo "$CLAUDE_OUTPUT" | jq -e '.' > /dev/null 2>&1; then
        echo "$CLAUDE_OUTPUT" | jq -c '{session_id: (.session_id // null), result: (.result // "No exploration result")}'
      else
        echo '{"session_id": null, "result": "Failed to parse exploration output"}'
      fi
    timeout: 10s
    capture:
      stdout: exploration_parsed
    on_success: create_plan
    on_failure: create_plan

  #==========================================================================
  # PHASE 3: PLANNING
  #==========================================================================

  create_plan:
    type: step
    description: Claude creates implementation plan
    command: |
      SESSION_ID=$(cat << 'JSONEOF' | jq -r '.session_id // empty'
      {{.states.parse_exploration.Output}}
      JSONEOF
      )
      RESUME_FLAG=""
      if [ -n "$SESSION_ID" ]; then
        RESUME_FLAG="--resume $SESSION_ID"
      fi
      claude $RESUME_FLAG -p "Based on your exploration, create a detailed implementation plan for {{.inputs.feature_id}}.

      ## Output Format (Markdown)
      # Implementation Plan: {{.inputs.feature_id}}

      ## Summary
      (2-3 sentences describing the approach)

      ## Implementation Steps
      1. Step description
         - File: path/to/file.go
         - Action: CREATE/MODIFY
         - Changes: specific changes needed

      ## Test Plan
      - Unit tests needed
      - Integration tests needed

      ## Files to Modify
      | File | Action | Complexity |
      |------|--------|------------|
      | path | CREATE/MODIFY | S/M/L |

      ## Risks
      - Risk and mitigation

      Be specific and actionable." \
        --allowedTools "Read,Grep,Glob" \
        --output-format json
    timeout: 300s
    capture:
      stdout: plan_raw
      max_size: 5MB
    on_success: extract_plan
    on_failure: error_planning
    hooks:
      pre:
        - log: "Claude creating implementation plan..."

  extract_plan:
    type: step
    description: Extract plan content
    command: |
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.create_plan.Output}}
      JSONEOF
      )

      # Try to parse as JSON and extract result
      if echo "$CLAUDE_OUTPUT" | jq -e '.' > /dev/null 2>&1; then
        RESULT=$(echo "$CLAUDE_OUTPUT" | jq -r '.result // empty')
        if [ -n "$RESULT" ]; then
          echo "$RESULT"
        else
          echo "# No plan generated"
          echo ""
          echo "Claude did not return a result field."
        fi
      else
        echo "# Plan extraction failed"
        echo ""
        echo "Raw output was not valid JSON."
      fi
    timeout: 10s
    capture:
      stdout: plan_content
    on_success: save_plan
    on_failure: save_plan

  save_plan:
    type: step
    description: Save implementation plan
    command: |
      mkdir -p docs/plans/implementation
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"
      cat > "$PLAN_FILE" << 'AWF_PLAN_CONTENT_EOF'
      {{.states.extract_plan.Output}}
      AWF_PLAN_CONTENT_EOF
      echo "$PLAN_FILE"
    timeout: 10s
    capture:
      stdout: plan_file_path
    on_success: add_to_kanban
    on_failure: add_to_kanban
    hooks:
      post:
        - log: "Plan saved to {{.states.save_plan.Output}}"

  #==========================================================================
  # PHASE 4: VALIDATION & DOCUMENTATION
  #==========================================================================

  add_to_kanban:
    type: step
    description: Add feature to KANBAN.md Backlog
    command: |
      KANBAN_FILE="docs/plans/KANBAN.md"
      if [ ! -f "$KANBAN_FILE" ]; then
        echo "KANBAN_NOT_FOUND"
        exit 0
      fi

      # Find spec file to extract slug (works even when running single step)
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -z "$SPEC_FILE" ]; then
        echo "SPEC_NOT_FOUND"
        exit 0
      fi
      SLUG=$(basename "$SPEC_FILE" .md | sed 's/^F[0-9]*-//')

      # Build the feature line
      FEATURE_LINE="- [{{.inputs.feature_id}}](features/{{.inputs.version}}/{{.inputs.feature_id}}-${SLUG}.md) {{.inputs.description}}"

      # Check if feature already exists
      if grep -q "\[{{.inputs.feature_id}}\]" "$KANBAN_FILE"; then
        echo "FEATURE_ALREADY_IN_KANBAN"
        exit 0
      fi

      # Find the correct phase section in Backlog based on version
      # Map version to phase name
      case "{{.inputs.version}}" in
        v0.1.0) PHASE_PATTERN="Phase 1 - MVP" ;;
        v0.2.0) PHASE_PATTERN="Phase 2 - Core" ;;
        v0.3.0) PHASE_PATTERN="Phase 3 - Advanced" ;;
        v0.4.0) PHASE_PATTERN="Phase 4 - Extensibility" ;;
        v1.0.0) PHASE_PATTERN="Phase 5 - Interfaces" ;;
        *) PHASE_PATTERN="Phase 2 - Core" ;;
      esac

      # Insert feature into the correct Backlog phase section
      awk -v feat="$FEATURE_LINE" -v phase="$PHASE_PATTERN" '
        /^## Backlog/ { in_backlog=1 }
        /^## Ready/ { in_backlog=0 }
        in_backlog && /^### / && $0 ~ phase {
          print
          getline
          # Skip existing features in this section
          while ($0 ~ /^- \[F[0-9]+\]/) { print; getline }
          # Insert new feature
          print feat
          next
        }
        { print }
      ' "$KANBAN_FILE" > "${KANBAN_FILE}.tmp" && mv "${KANBAN_FILE}.tmp" "$KANBAN_FILE"

      echo "KANBAN_UPDATED"
    timeout: 15s
    capture:
      stdout: kanban_result
    on_success: run_tests
    on_failure: run_tests

  run_tests:
    type: step
    description: Run test suite to ensure clean baseline
    command: make test-unit 2>&1 || echo "TEST_WARNING"
    timeout: 300s
    capture:
      stdout: test_output
    on_success: update_memories
    on_failure: update_memories
    hooks:
      pre:
        - log: "Running tests..."

  update_memories:
    type: step
    description: Update project memories via Claude
    command: |
      claude -p "Update the project memories to add the new feature {{.inputs.feature_id}}.

      Use mcp__plugin_common_serena__edit_memory to update feature_roadmap:
      - Add {{.inputs.feature_id}} to the {{.inputs.version}} section with status PLANNED

      Feature details:
      - ID: {{.inputs.feature_id}}
      - Version: {{.inputs.version}}
      - Description: {{.inputs.description}}

      Confirm what was updated." \
        --allowedTools "mcp__plugin_common_serena__edit_memory,mcp__plugin_common_serena__read_memory" \
        --dangerously-skip-permissions \
        --output-format json 2>&1 || echo "MEMORY_UPDATE_SKIPPED"
    timeout: 120s
    capture:
      stdout: memory_result
    on_success: summary
    on_failure: summary
    hooks:
      pre:
        - log: "Updating project memories..."

  summary:
    type: step
    description: Generate workflow summary
    command: |
      echo "╔════════════════════════════════════════════════════════════════╗"
      echo "║              FEATURE CREATION COMPLETE                         ║"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Feature: {{.inputs.feature_id}}"
      echo "║ Version: {{.inputs.version}}"
      echo "║ Description: {{.inputs.description}}"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Files created:"
      echo "║   Spec: {{.states.save_spec.Output}}"
      echo "║   Plan: {{.states.save_plan.Output}}"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Documentation:"
      echo "║   KANBAN: {{.states.add_to_kanban.Output}}"
      echo "║   Memory: $(echo '{{.states.update_memories.Output}}' | grep -q 'SKIPPED' && echo 'SKIPPED' || echo 'UPDATED')"
      echo "║ Tests: $(echo '{{.states.run_tests.Output}}' | grep -q 'TEST_WARNING' && echo 'WARNINGS' || echo 'PASS')"
      echo "╚════════════════════════════════════════════════════════════════╝"
    timeout: 5s
    capture:
      stdout: summary_output
    on_success: done
    on_failure: done

  #==========================================================================
  # TERMINAL STATES
  #==========================================================================

  done:
    type: terminal
    status: success
    message: "Feature {{.inputs.feature_id}} created successfully"

  error_template:
    type: terminal
    status: failure
    message: "Failed to read feature template - ensure docs/plans/features/TEMPLATE.md exists"

  error_generation:
    type: terminal
    status: failure
    message: "Claude failed to generate feature spec"

  error_save:
    type: terminal
    status: failure
    message: "Failed to save feature spec file"

  error_exploration:
    type: terminal
    status: failure
    message: "Claude exploration failed - check claude CLI is installed and authenticated"

  error_planning:
    type: terminal
    status: failure
    message: "Claude planning failed"

hooks:
  workflow_start:
    - log: "=== Creating feature {{.inputs.feature_id}} for {{.inputs.version}} ==="
  workflow_end:
    - log: "=== Feature creation completed in {{.workflow.Duration}} ==="
  workflow_error:
    - log: "=== Feature creation failed: {{.error.Message}} ==="
