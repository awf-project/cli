# Feature Implementation Workflow
# Implements a feature following its plan using TDD (Strict TIDY approach).
# No commit - user decides when to commit after review.
#
# Usage: awf run implement --input feature_id=F038
# With agents: awf run implement --input feature_id=F038 --input agents="go:golang-expert"

name: implement
description: Implement a feature using TDD approach with optional agents/skills
version: "1.0.0"
author: awf

inputs:
  - name: feature_id
    type: string
    description: Feature ID (e.g., F038)
    required: true
    validation:
      pattern: "^F[0-9]{3}$"

  - name: agents
    type: string
    description: Comma-separated agents to use (e.g., go:golang-expert,web:test-automator)
    required: false
    default: ""

  - name: skills
    type: string
    description: Comma-separated skills to use (e.g., go:go-testing,js:vitest)
    required: false
    default: ""

states:
  initial: find_spec

  #==========================================================================
  # PHASE 0: GIT BRANCH SETUP
  #==========================================================================

  find_spec:
    type: step
    description: Find specification
    command: |
      # Find spec file to extract slug
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -z "$SPEC_FILE" ]; then
        echo "ERROR: Spec not found for {{.inputs.feature_id}}"
        exit 1
      fi
      
      echo "$SPEC_FILE"
    timeout: 30s
    capture:
      stdout: spec_file
    on_success: create_branch
    on_failure: error_find_spec
    hooks:
      pre:
        - log: "Find spec..."
      post:
        - log: "Found spec {{.inputs.feature_id}}"

  create_branch:
    type: step
    description: Create or switch to feature branch
    command: |
      # Extract slug from filename (F038-prompt-storage.md -> prompt-storage)
      SLUG=$(basename "{{.states.find_spec.Output}}" .md | sed 's/^F[0-9]*-//')
      BRANCH="feature/{{.inputs.feature_id}}-${SLUG}"

      # Check if already on this branch
      CURRENT=$(git branch --show-current)
      if [ "$CURRENT" = "$BRANCH" ]; then
        echo "$BRANCH"
        exit 0
      fi

      # Check if branch exists locally
      if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
        git checkout "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi

      echo "$BRANCH"
    timeout: 30s
    capture:
      stdout: branch_name
    on_success: explore_codebase
    on_failure: error_branch
    hooks:
      pre:
        - log: "Creating/switching to feature branch..."
      post:
        - log: "On branch {{.states.create_branch.Output}}"

  #==========================================================================
  # PHASE 1: PLANNING
  #==========================================================================

  explore_codebase:
    type: step
    description: Claude explores codebase for implementation context
    command: |
      SPEC_CONTENT=$(cat "{{.states.find_spec.Output}}")
      claude -p "You are exploring the awf (AI Workflow CLI) codebase to understand how to implement a new feature.

      ## Feature to implement
      $SPEC_CONTENT

      ## Your Task
      1. Explore the codebase architecture (hexagonal: domain/application/infrastructure/interfaces)
      2. Find similar features already implemented as reference
      3. Identify key interfaces and types that will be affected
      4. List 3-5 critical files that must be modified or created

      Output a structured exploration report:
      - Architecture layer(s) involved
      - Critical files with reasons
      - Pattern files to follow
      - Dependencies and risks" \
        --allowedTools "Read,Grep,Glob" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 300s
    capture:
      stdout: exploration_raw
      max_size: 5MB
    on_success: parse_exploration
    on_failure: error_exploration
    hooks:
      pre:
        - log: "Claude exploring codebase..."
      post:
        - log: "Exploration complete"

  parse_exploration:
    type: step
    description: Extract exploration result and session ID
    command: |
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.explore_codebase.Output}}
      JSONEOF
      )

      # Try to parse as JSON, fallback to empty object
      if echo "$CLAUDE_OUTPUT" | jq -e '.' > /dev/null 2>&1; then
        echo "$CLAUDE_OUTPUT" | jq -c '{session_id: (.session_id // null), result: (.result // "No exploration result")}'
      else
        echo '{"session_id": null, "result": "Failed to parse exploration output"}'
      fi
    timeout: 10s
    capture:
      stdout: exploration_parsed
    on_success: create_plan
    on_failure: create_plan

  create_plan:
    type: step
    description: Claude creates implementation plan
    command: |
      SESSION_ID=$(cat << 'JSONEOF' | jq -r '.session_id // empty'
      {{.states.parse_exploration.Output}}
      JSONEOF
      )
      RESUME_FLAG=""
      if [ -n "$SESSION_ID" ]; then
        RESUME_FLAG="--resume $SESSION_ID"
      fi
      claude $RESUME_FLAG -p "Based on your exploration, create a detailed implementation plan for {{.inputs.feature_id}}.

      ## Output Format (Markdown)
      # Implementation Plan: {{.inputs.feature_id}}

      ## Summary
      (2-3 sentences describing the approach)

      ## Implementation Steps
      1. Step description
         - File: path/to/file.go
         - Action: CREATE/MODIFY
         - Changes: specific changes needed

      ## Test Plan
      - Unit tests needed
      - Integration tests needed

      ## Files to Modify
      | File | Action | Complexity |
      |------|--------|------------|
      | path | CREATE/MODIFY | S/M/L |

      ## Risks
      - Risk and mitigation

      Be specific and actionable." \
        --allowedTools "Read,Grep,Glob" \
        --output-format json
    timeout: 300s
    capture:
      stdout: plan_raw
      max_size: 5MB
    on_success: extract_plan
    on_failure: error_planning
    hooks:
      pre:
        - log: "Claude creating implementation plan..."

  extract_plan:
    type: step
    description: Extract plan content
    command: |
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.create_plan.Output}}
      JSONEOF
      )

      # Try to parse as JSON and extract result
      if echo "$CLAUDE_OUTPUT" | jq -e '.' > /dev/null 2>&1; then
        RESULT=$(echo "$CLAUDE_OUTPUT" | jq -r '.result // empty')
        if [ -n "$RESULT" ]; then
          echo "$RESULT"
        else
          echo "# No plan generated"
          echo ""
          echo "Claude did not return a result field."
        fi
      else
        echo "# Plan extraction failed"
        echo ""
        echo "Raw output was not valid JSON."
      fi
    timeout: 10s
    capture:
      stdout: plan_content
    on_success: save_plan
    on_failure: save_plan

  save_plan:
    type: step
    description: Save implementation plan
    command: |
      mkdir -p docs/plans/implementation
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"
      cat > "$PLAN_FILE" << 'AWF_PLAN_CONTENT_EOF'
      {{.states.extract_plan.Output}}
      AWF_PLAN_CONTENT_EOF
      echo "$PLAN_FILE"
    timeout: 10s
    capture:
      stdout: plan_file_path
    on_success: load_spec
    on_failure: load_spec
    hooks:
      post:
        - log: "Plan saved to {{.states.save_plan.Output}}"

  #==========================================================================
  # PHASE 2: VALIDATION BASELINE
  #==========================================================================

  load_spec:
    type: step
    description: Find and read feature spec
    command: |
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -z "$SPEC_FILE" ]; then
        echo "ERROR: Spec not found for {{.inputs.feature_id}}"
        exit 1
      fi
      cat "$SPEC_FILE"
    timeout: 10s
    capture:
      stdout: spec_content
      max_size: 1MB
    on_success: load_plan
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Loading spec for {{.inputs.feature_id}}..."

  load_plan:
    type: step
    description: Read implementation plan
    command: |
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"
      if [ ! -f "$PLAN_FILE" ]; then
        echo "ERROR: Plan not found at $PLAN_FILE"
        exit 1
      fi
      cat "$PLAN_FILE"
    timeout: 10s
    capture:
      stdout: plan_content
      max_size: 1MB
    on_success: parallel_baseline
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Loading implementation plan..."

  #==========================================================================
  # PHASE 2.5: BASELINE VALIDATION (PARALLEL)
  #==========================================================================

  parallel_baseline:
    type: parallel
    description: Run lint and tests baseline in parallel
    parallel:
      - run_lint_before
      - run_tests_before
    strategy: all_succeed
    max_concurrent: 2
    on_success: write_interfaces
    on_failure: error_baseline

  run_lint_before:
    type: step
    description: Lint baseline - must pass
    command: make lint
    timeout: 120s
    capture:
      stdout: lint_before_output
    on_success: write_interfaces
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Running lint baseline..."

  run_tests_before:
    type: step
    description: Tests baseline - must pass
    command: make test-unit
    timeout: 300s
    capture:
      stdout: tests_before_output
    on_success: write_interfaces
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Running tests baseline..."
      post:
        - log: "Baseline OK - proceeding with TDD"

  #==========================================================================
  # PHASE 3: TDD RED - Write interfaces then tests
  #==========================================================================

  write_interfaces:
    type: step
    description: Claude writes interfaces/types/stubs (code compiles but does nothing)
    command: |
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )
      claude -p "You are implementing feature {{.inputs.feature_id}} using strict TDD.

      ## PHASE: Write Interfaces/Types/Stubs (RED phase - step 1)

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Your Task
      Create ONLY the interfaces, types, and stub implementations needed for the tests to compile.
      The stubs should:
      - Return zero values or panic(\"not implemented\")
      - Allow tests to compile but fail when run
      - Follow the plan's file structure

      DO NOT implement the actual logic yet - just the skeleton.

      ## Available Agents
      {{.inputs.agents}}

      ## Available Skills
      {{.inputs.skills}}

      If agents/skills are specified, use them via Task/Skill tools when appropriate." \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: interfaces_output
      max_size: 5MB
    on_success: write_tests
    on_failure: write_tests
    hooks:
      pre:
        - log: "Claude writing interfaces/stubs..."

  write_tests:
    type: step
    description: Claude writes tests using the interfaces
    command: |
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )
      claude -p "You are implementing feature {{.inputs.feature_id}} using strict TDD.

      ## PHASE: Write Tests (RED phase - step 2)

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Your Task
      Write comprehensive tests based on the Test Plan section:
      - Unit tests for each component
      - Integration tests if specified
      - Tests should use the interfaces/stubs created in the previous step
      - Tests MUST compile (use existing interfaces)
      - Tests SHOULD fail when run (stubs don't implement logic)

      Follow the project's testing conventions (table-driven tests, testify).

      ## Available Agents
      {{.inputs.agents}}

      ## Available Skills
      {{.inputs.skills}}

      If agents/skills are specified, use them via Task/Skill tools when appropriate." \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: tests_output
      max_size: 5MB
    on_success: run_tests_red
    on_failure: run_tests_red
    hooks:
      pre:
        - log: "Claude writing tests..."

  run_tests_red:
    type: step
    description: Run tests - should fail (RED phase)
    command: |
      make test-unit 2>&1
      EXIT_CODE=$?
      if [ $EXIT_CODE -eq 0 ]; then
        echo "WARNING: Tests passed but should have failed (RED phase)"
        echo "RED_PHASE_WARNING"
      else
        echo "RED phase OK - tests fail as expected"
        echo "RED_PHASE_OK"
      fi
      exit 0
    timeout: 300s
    capture:
      stdout: tests_red_output
    on_success: implement_feature
    on_failure: implement_feature
    hooks:
      pre:
        - log: "Running tests (expecting failure - RED phase)..."

  #==========================================================================
  # PHASE 4: TDD GREEN - Implementation
  #==========================================================================

  implement_feature:
    type: step
    description: Claude implements the feature (GREEN phase)
    command: |
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )
      claude -p "You are implementing feature {{.inputs.feature_id}} using strict TDD.

      ## PHASE: Implementation (GREEN phase)

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Your Task
      Implement the actual logic to make all tests pass:
      - Replace stub implementations with real code
      - Follow the implementation steps from the plan
      - Ensure code compiles and passes lint
      - Make tests pass (GREEN)

      ## Available Agents
      {{.inputs.agents}}

      ## Available Skills
      {{.inputs.skills}}

      If agents/skills are specified, use them via Task/Skill tools when appropriate.
      For example, use go:golang-expert for complex Go patterns." \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 900s
    capture:
      stdout: implement_output
      max_size: 10MB
    on_success: parallel_validation
    on_failure: parallel_validation
    hooks:
      pre:
        - log: "Claude implementing feature..."

  #==========================================================================
  # PHASE 5: VALIDATION (PARALLEL)
  #==========================================================================

  parallel_validation:
    type: parallel
    description: Run final lint and tests in parallel
    parallel:
      - run_lint_after
      - run_tests_green
    strategy: best_effort
    max_concurrent: 2
    on_success: update_spec_status
    on_failure: update_spec_status

  run_lint_after:
    type: step
    description: Lint after implementation
    command: make lint 2>&1 || echo "LINT_WARNING"
    timeout: 120s
    capture:
      stdout: lint_after_output
    on_success: update_spec_status
    on_failure: update_spec_status
    hooks:
      pre:
        - log: "Running lint after implementation..."

  run_tests_green:
    type: step
    description: Run tests - should pass (GREEN phase)
    command: |
      make test-unit 2>&1
      EXIT_CODE=$?
      if [ $EXIT_CODE -eq 0 ]; then
        echo "GREEN_PHASE_OK"
      else
        echo "GREEN_PHASE_WARNING: Tests still failing"
      fi
      exit 0
    timeout: 300s
    capture:
      stdout: tests_green_output
    on_success: update_spec_status
    on_failure: update_spec_status
    hooks:
      pre:
        - log: "Running tests (expecting pass - GREEN phase)..."

  #==========================================================================
  # PHASE 6: SUMMARY
  #==========================================================================

  update_spec_status:
    type: step
    description: Update spec status to implemented
    command: |
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -n "$SPEC_FILE" ]; then
        sed -i 's/Status\*\*: planned/Status**: implemented/g' "$SPEC_FILE"
        echo "Updated status in $SPEC_FILE"
      else
        echo "SPEC_UPDATE_SKIPPED"
      fi
    timeout: 10s
    capture:
      stdout: status_update_output
    on_success: update_kanban
    on_failure: update_kanban

  update_kanban:
    type: step
    description: Move feature from Backlog to Done in KANBAN.md
    command: |
      KANBAN_FILE="docs/plans/KANBAN.md"
      if [ ! -f "$KANBAN_FILE" ]; then
        echo "KANBAN_NOT_FOUND"
        exit 0
      fi

      # Find the feature line pattern (e.g., "- [F039](features/v0.1.0/F039-...")
      FEATURE_PATTERN="\[{{.inputs.feature_id}}\]"

      # Check if feature exists in file
      if ! grep -q "$FEATURE_PATTERN" "$KANBAN_FILE"; then
        echo "FEATURE_NOT_IN_KANBAN"
        exit 0
      fi

      # Extract the full feature line
      FEATURE_LINE=$(grep "$FEATURE_PATTERN" "$KANBAN_FILE" | head -1)

      # Remove from current location (Backlog section)
      sed -i "/$FEATURE_PATTERN/d" "$KANBAN_FILE"

      # Find which phase this feature belongs to
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -z "$SPEC_FILE" ]; then
        echo "KANBAN_SPEC_NOT_FOUND"
        exit 0
      fi

      # Extract version and map to phase
      VERSION=$(echo "$SPEC_FILE" | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+')
      case "$VERSION" in
        v0.1.0) PHASE_HEADER="### Phase 1 - MVP (v0.1.0)" ;;
        v0.2.0) PHASE_HEADER="### Phase 2 - Core Features (v0.2.0)" ;;
        v0.3.0) PHASE_HEADER="### Phase 3 - Advanced Features (v0.3.0)" ;;
        v0.4.0) PHASE_HEADER="### Phase 4 - Extensibility & AI (v0.4.0)" ;;
        v1.0.0) PHASE_HEADER="### Phase 5 - Interfaces (v1.0.0)" ;;
        *) PHASE_HEADER="### Phase 2 - Core Features (v0.2.0)" ;;
      esac

      # Check if phase section exists in Done
      if grep -q "^$PHASE_HEADER" "$KANBAN_FILE"; then
        # Phase exists - insert feature after header
        awk -v feat="$FEATURE_LINE" -v phase="$PHASE_HEADER" '
          /^## Done/ { in_done=1 }
          /^## Summary/ { in_done=0 }
          in_done && $0 == phase {
            print
            getline
            while ($0 ~ /^- \[F[0-9]+\]/) { print; getline }
            print feat
            next
          }
          { print }
        ' "$KANBAN_FILE" > "${KANBAN_FILE}.tmp" && mv "${KANBAN_FILE}.tmp" "$KANBAN_FILE"
      else
        # Phase doesn't exist in Done - create it after ## Done
        awk -v feat="$FEATURE_LINE" -v phase="$PHASE_HEADER" '
          /^## Done/ {
            print
            print ""
            print phase
            print feat
            next
          }
          { print }
        ' "$KANBAN_FILE" > "${KANBAN_FILE}.tmp" && mv "${KANBAN_FILE}.tmp" "$KANBAN_FILE"
      fi

      echo "KANBAN_UPDATED"
    timeout: 15s
    capture:
      stdout: kanban_update_output
    on_success: update_readme
    on_failure: update_readme

  update_readme:
    type: step
    description: Claude updates README.md based on implemented feature
    command: |
      # Get staged files list
      STAGED_FILES=$(git diff --cached --name-only 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")

      # Find spec and plan files
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"

      # Read spec content
      SPEC_CONTENT=""
      if [ -n "$SPEC_FILE" ] && [ -f "$SPEC_FILE" ]; then
        SPEC_CONTENT=$(cat "$SPEC_FILE")
      fi

      # Read plan content
      PLAN_CONTENT=""
      if [ -f "$PLAN_FILE" ]; then
        PLAN_CONTENT=$(cat "$PLAN_FILE")
      fi

      claude -p "Update the README.md to reflect the newly implemented feature {{.inputs.feature_id}}.

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Staged/Modified Files
      $STAGED_FILES

      ## Your Task
      1. Read the current README.md
      2. Update the Roadmap section:
         - Check the checkbox for this feature (change '- [ ]' to '- [x]')
         - If the feature is not listed, add it to the appropriate phase section
      3. If the feature adds new CLI commands or flags:
         - Update the Commands table
         - Update the relevant Flags sections
      4. If the feature changes workflow syntax:
         - Update the Workflow Syntax section
      5. Keep changes minimal and focused on this feature only

      Output 'README_UPDATED' when done, or 'README_NO_CHANGES' if no updates needed." \
        --allowedTools "Read,Edit" \
        --dangerously-skip-permissions \
        --output-format json 2>&1 || echo "README_UPDATE_FAILED"
    timeout: 180s
    capture:
      stdout: readme_update_output
      max_size: 1MB
    on_success: update_changelog
    on_failure: update_changelog

  update_changelog:
    type: step
    description: Add or update feature in CHANGELOG.md under Unreleased
    command: |
      CHANGELOG_FILE="CHANGELOG.md"
      if [ ! -f "$CHANGELOG_FILE" ]; then
        echo "CHANGELOG_NOT_FOUND"
        exit 0
      fi

      # Get feature description from spec file
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -z "$SPEC_FILE" ]; then
        echo "SPEC_NOT_FOUND"
        exit 0
      fi

      # Extract title from spec (first H1 line after the feature ID)
      TITLE=$(grep -m1 "^# {{.inputs.feature_id}}:" "$SPEC_FILE" | sed 's/^# {{.inputs.feature_id}}: //')
      if [ -z "$TITLE" ]; then
        # Fallback: use slug from filename
        TITLE=$(basename "$SPEC_FILE" .md | sed 's/^F[0-9]*-//' | tr '-' ' ')
      fi

      # Check if feature already exists in CHANGELOG
      if grep -q "\*\*{{.inputs.feature_id}}\*\*" "$CHANGELOG_FILE"; then
        echo "FEATURE_ALREADY_IN_CHANGELOG"
        exit 0
      fi

      # Build the changelog entry
      ENTRY="- **{{.inputs.feature_id}}**: $TITLE"

      # Insert after "### Added" under "[Unreleased]"
      awk -v entry="$ENTRY" '
        /^## \[Unreleased\]/ { in_unreleased=1 }
        /^## \[/ && !/\[Unreleased\]/ { in_unreleased=0 }
        in_unreleased && /^### Added/ {
          print
          print entry
          next
        }
        { print }
      ' "$CHANGELOG_FILE" > "${CHANGELOG_FILE}.tmp" && mv "${CHANGELOG_FILE}.tmp" "$CHANGELOG_FILE"

      echo "CHANGELOG_UPDATED"
    timeout: 15s
    capture:
      stdout: changelog_result
    on_success: update_memories
    on_failure: update_memories
    hooks:
      pre:
        - log: "Updating CHANGELOG.md..."

  update_memories:
    type: step
    description: Update project memories via Claude
    command: |
      # Extract version from spec file path
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      VERSION=$(echo "$SPEC_FILE" | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
      TITLE=$(grep -m1 "^# {{.inputs.feature_id}}:" "$SPEC_FILE" 2>/dev/null | sed 's/^# {{.inputs.feature_id}}: //' || echo "Feature {{.inputs.feature_id}}")

      claude -p "Update the project memories to reflect the implemented feature {{.inputs.feature_id}}.

      Use mcp__plugin_common_serena__edit_memory to update feature_roadmap:
      - Mark {{.inputs.feature_id}} as IMPLEMENTED in the $VERSION section

      Feature details:
      - ID: {{.inputs.feature_id}}
      - Version: $VERSION
      - Title: $TITLE

      Confirm what was updated." \
        --allowedTools "mcp__plugin_common_serena__edit_memory,mcp__plugin_common_serena__read_memory" \
        --dangerously-skip-permissions \
        --output-format json 2>&1 || echo "MEMORY_UPDATE_SKIPPED"
    timeout: 120s
    capture:
      stdout: memory_result
    on_success: summary
    on_failure: summary
    hooks:
      pre:
        - log: "Updating project memories..."

  summary:
    type: step
    description: Generate implementation summary
    command: |
      echo "╔════════════════════════════════════════════════════════════════╗"
      echo "║           FEATURE IMPLEMENTATION COMPLETE                      ║"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Feature: {{.inputs.feature_id}}"
      echo "║ Agents: {{.inputs.agents}}"
      echo "║ Skills: {{.inputs.skills}}"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ TDD Results:"
      RED_RESULT=$(echo '{{.states.run_tests_red.Output}}' | grep -o 'RED_PHASE_[A-Z]*' | tail -1)
      GREEN_RESULT=$(echo '{{.states.run_tests_green.Output}}' | grep -o 'GREEN_PHASE_[A-Z]*' | tail -1)
      LINT_AFTER=$(echo '{{.states.run_lint_after.Output}}' | grep -q 'LINT_WARNING' && echo 'WARNING' || echo 'PASS')
      echo "║   Baseline Lint: PASS"
      echo "║   Baseline Tests: PASS"
      echo "║   RED Phase: $RED_RESULT"
      echo "║   GREEN Phase: $GREEN_RESULT"
      echo "║   Final Lint: $LINT_AFTER"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Documentation Updates:"
      echo "║   Spec Status: {{.states.update_spec_status.Output}}"
      echo "║   Plan: {{.states.save_plan.Output}}"
      echo "║   KANBAN: {{.states.update_kanban.Output}}"
      echo "║   README: {{.states.update_readme.Output}}"
      echo "║   CHANGELOG: {{.states.update_changelog.Output}}"
      echo "║   Memory: $(echo '{{.states.update_memories.Output}}' | grep -q 'SKIPPED' && echo 'SKIPPED' || echo 'UPDATED')"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ NO COMMIT - Review changes and commit manually                 ║"
      echo "╚════════════════════════════════════════════════════════════════╝"
    timeout: 10s
    capture:
      stdout: summary_output
    on_success: done
    on_failure: done

  #==========================================================================
  # TERMINAL STATES
  #==========================================================================

  done:
    type: terminal
    status: success
    message: "Feature {{.inputs.feature_id}} implementation complete - review and commit manually"

  error_find_spec:
    type: terminal
    status: failure
    message: "Unable to find spec {{.inputs.feature_id}}"

  error_exploration:
    type: terminal
    status: failure
    message: "Claude exploration failed - check claude CLI is installed and authenticated"

  error_planning:
    type: terminal
    status: failure
    message: "Claude planning failed"

  error_baseline:
    type: terminal
    status: failure
    message: "Baseline validation failed - fix lint/tests before implementing"

  error_branch:
    type: terminal
    status: failure
    message: "Failed to create feature branch - check spec file exists"

hooks:
  workflow_start:
    - log: "=== Implementing {{.inputs.feature_id}} with TDD ==="
  workflow_end:
    - log: "=== Implementation completed in {{.workflow.Duration}} ==="
  workflow_error:
    - log: "=== Implementation failed: {{.error.Message}} ==="
