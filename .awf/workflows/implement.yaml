# Issue Implementation Workflow
# Implements any GitHub issue using TDD (Strict TIDY approach).
# Supports features (F044), bugs (#48), and other issue types.
# Requires plan from 'awf run plan' workflow.
# No commit - user decides when to commit after review.
#
# Usage:
#   awf run implement --input issue=F044        # Feature
#   awf run implement --input issue=48          # Bug
#   awf run implement --input issue=48 --input agents="go:golang-expert"
#
# Prerequisites:
#   awf run plan --input issue=48

name: implement
description: Implement any GitHub issue using TDD (requires plan from 'awf run plan')
version: "2.2.0"
author: awf

inputs:
  - name: issue
    type: string
    description: GitHub issue number (48) or feature ID (F044)
    required: true
    validation:
      pattern: "^(F[0-9]{3}|[0-9]+)$"

  - name: agents
    type: string
    description: Comma-separated agents to use (e.g., go:golang-expert,web:test-automator)
    required: false
    default: ""

  - name: skills
    type: string
    description: Comma-separated skills to use (e.g., go:go-testing,js:vitest)
    required: false
    default: ""

states:
  initial: find_spec

  #==========================================================================
  # PHASE 0: SPEC RETRIEVAL & PLAN CHECK
  #==========================================================================

  find_spec:
    type: step
    description: Find GitHub issue (by number or feature ID)
    command: |
      ISSUE_INPUT="{{.inputs.issue}}"

      # Detect if it's a number or F-prefixed ID
      if echo "$ISSUE_INPUT" | grep -qE '^[0-9]+$'; then
        # Direct issue number - fetch by number
        ISSUE_JSON=$(gh issue view "$ISSUE_INPUT" --repo vanoix/awf \
          --json url,number,title,body,labels 2>/dev/null)
      else
        # F-prefixed ID - search by title
        ISSUE_JSON=$(gh issue list --repo vanoix/awf \
          --search "${ISSUE_INPUT}:" --state all \
          --json url,number,title,body,labels --jq '.[0]' 2>/dev/null)
      fi

      if [ -z "$ISSUE_JSON" ] || [ "$ISSUE_JSON" = "null" ]; then
        echo "ERROR: No GitHub issue found for {{.inputs.issue}}" >&2
        exit 1
      fi

      ISSUE_URL=$(echo "$ISSUE_JSON" | jq -r '.url')
      ISSUE_NUM=$(echo "$ISSUE_JSON" | jq -r '.number')
      ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
      SPEC_CONTENT=$(echo "$ISSUE_JSON" | jq -r '.body')

      # Detect type from labels
      LABELS=$(echo "$ISSUE_JSON" | jq -r '.labels[].name' 2>/dev/null | tr '\n' ',' || echo "")
      if echo "$LABELS" | grep -qi "bug"; then
        ISSUE_TYPE="bug"
      elif echo "$LABELS" | grep -qi "feature"; then
        ISSUE_TYPE="feature"
      else
        ISSUE_TYPE="issue"
      fi

      # Output JSON with issue info, type, and spec content
      jq -n \
        --arg url "$ISSUE_URL" \
        --arg num "$ISSUE_NUM" \
        --arg title "$ISSUE_TITLE" \
        --arg content "$SPEC_CONTENT" \
        --arg type "$ISSUE_TYPE" \
        --arg input "$ISSUE_INPUT" \
        '{issue_url: $url, issue_num: $num, title: $title, spec_content: $content, issue_type: $type, issue_input: $input}'
    timeout: 30s
    capture:
      stdout: spec_info
    on_success: check_plan_exists
    on_failure: error_find_spec
    hooks:
      pre:
        - log: "Finding GitHub issue for {{.inputs.issue}}..."
      post:
        - log: "Found issue for {{.inputs.issue}}"

  check_plan_exists:
    type: step
    description: Verify plan and tasks files exist
    command: |
      PLAN_FILE=".specify/implementation/{{.inputs.issue}}/plan.md"
      TASKS_FILE=".specify/implementation/{{.inputs.issue}}/tasks.md"

      if [ ! -f "$PLAN_FILE" ]; then
        echo "ERROR: Plan not found at $PLAN_FILE"
        echo "Run 'awf run plan --input issue={{.inputs.issue}}' first"
        exit 1
      fi

      if [ ! -f "$TASKS_FILE" ]; then
        echo "ERROR: Tasks not found at $TASKS_FILE"
        echo "Run 'awf run plan --input issue={{.inputs.issue}}' first"
        exit 1
      fi

      echo "PLAN_EXISTS"
    timeout: 5s
    capture:
      stdout: plan_check_result
    on_success: load_spec
    on_failure: error_no_plan
    hooks:
      pre:
        - log: "Checking plan exists..."
      post:
        - log: "Plan verified"

  #==========================================================================
  # PHASE 2: VALIDATION BASELINE
  #==========================================================================

  load_spec:
    type: step
    description: Extract spec content from find_spec output
    command: |
      # Get spec content from find_spec (already fetched from GitHub issue, use heredoc)
      SPEC_INFO=$(cat << 'JSONEOF'
      {{.states.find_spec.Output}}
      JSONEOF
      )
      SPEC_CONTENT=$(echo "$SPEC_INFO" | jq -r '.spec_content')

      if [ -z "$SPEC_CONTENT" ]; then
        echo "ERROR: No spec content found for {{.inputs.issue}}"
        exit 1
      fi

      echo "$SPEC_CONTENT"
    timeout: 10s
    capture:
      stdout: spec_content
      max_size: 1MB
    on_success: load_plan
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Extracting spec for {{.inputs.issue}}..."

  load_plan:
    type: step
    description: Read implementation plan
    command: |
      PLAN_FILE=".specify/implementation/{{.inputs.issue}}/plan.md"
      if [ ! -f "$PLAN_FILE" ]; then
        echo "ERROR: Plan not found at $PLAN_FILE"
        exit 1
      fi
      cat "$PLAN_FILE"
    timeout: 10s
    capture:
      stdout: plan_content
      max_size: 1MB
    on_success: extract_components
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Loading implementation plan..."

  extract_components:
    type: step
    description: Extract components/tasks JSON for TDD loop
    command: |
      PLAN_FILE=".specify/implementation/{{.inputs.issue}}/plan.md"
      TASKS_FILE=".specify/implementation/{{.inputs.issue}}/tasks.md"

      # Try tasks.md first (Spec-Kit format)
      if [ -f "$TASKS_FILE" ]; then
        echo "Using tasks.md format" >&2

        # Parse tasks from markdown format into JSON array
        # Format: - [ ] T001 [P] [US1] Description with file path
        TASKS=$(awk '
          /^- \[ \] T[0-9]+/ {
            # Extract task ID
            match($0, /T[0-9]+/);
            id = substr($0, RSTART, RLENGTH);

            # Check for [P] parallelizable marker
            parallel = (index($0, "[P]") > 0) ? "true" : "false";

            # Extract user story if present
            user_story = "";
            if (match($0, /\[US[0-9]+\]/)) {
              user_story = substr($0, RSTART+1, RLENGTH-2);
            }

            # Extract description (everything after markers)
            desc = $0;
            gsub(/^- \[ \] T[0-9]+ /, "", desc);
            gsub(/\[P\] /, "", desc);
            gsub(/\[US[0-9]+\] /, "", desc);

            # Output JSON line
            printf "{\"name\":\"%s\",\"description\":\"%s\",\"parallel\":%s,\"user_story\":\"%s\"}\n", id, desc, parallel, user_story;
          }
        ' "$TASKS_FILE" | jq -sc '.')

        if [ -n "$TASKS" ] && [ "$TASKS" != "[]" ]; then
          TASK_COUNT=$(echo "$TASKS" | jq 'length')
          echo "Found $TASK_COUNT tasks" >&2
          echo "$TASKS"
          exit 0
        fi
      fi

      # Fallback to components from plan.md (legacy format)
      echo "Using components format (legacy)" >&2

      # Extract JSON block between ```json and ``` after ## Components
      # Note: Can't use range /^## Components/,/^## / because both patterns match the same line
      COMPONENTS=$(awk '
        BEGIN { in_section=0; in_json=0 }
        /^## Components/ { in_section=1; next }
        /^## / && in_section { in_section=0 }
        in_section && /```json/ { in_json=1; next }
        in_section && /```/ && in_json { in_json=0; next }
        in_section && in_json { print }
      ' "$PLAN_FILE" | jq -c '.')

      if [ -z "$COMPONENTS" ] || [ "$COMPONENTS" = "null" ]; then
        echo "ERROR: No valid components JSON found in plan"
        echo 'Expected: ## Components section with ```json block'
        echo "Or: tasks.md file with T001 format tasks"
        exit 1
      fi

      # Validate it's an array
      if ! echo "$COMPONENTS" | jq -e 'type == "array"' > /dev/null 2>&1; then
        echo "ERROR: Components must be a JSON array"
        exit 1
      fi

      COMPONENT_COUNT=$(echo "$COMPONENTS" | jq 'length')
      echo "Found $COMPONENT_COUNT components" >&2
      echo "$COMPONENTS"
    timeout: 30s
    capture:
      stdout: components_json
    on_success: parallel_baseline
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Extracting components/tasks from plan..."
      post:
        - log: "Components/tasks extracted successfully"

  #==========================================================================
  # PHASE 2.5: BASELINE VALIDATION (PARALLEL)
  #==========================================================================

  parallel_baseline:
    type: parallel
    description: Run lint and tests baseline in parallel
    parallel:
      - run_lint_before
      - run_tests_before
    strategy: all_succeed
    max_concurrent: 2
    on_success: tdd_component_loop
    on_failure: error_baseline

  run_lint_before:
    type: step
    description: Lint baseline - must pass
    command: make lint
    timeout: 120s
    capture:
      stdout: lint_before_output
    on_success: tdd_component_loop
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Running lint baseline..."

  run_tests_before:
    type: step
    description: Tests baseline - must pass
    command: make test-unit
    timeout: 300s
    capture:
      stdout: tests_before_output
    on_success: tdd_component_loop
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Running tests baseline..."
      post:
        - log: "Baseline OK - proceeding with TDD"

  #==========================================================================
  # PHASE 3-4: TDD PER COMPONENT (for_each component -> while retry)
  #==========================================================================

  tdd_component_loop:
    type: for_each
    description: TDD loop over each component (stub -> tests -> implement)
    items: "{{.states.extract_components.Output}}"
    max_iterations: 50
    body:
      - write_component_stub
      - write_component_tests
      - run_component_tests_red
      - component_green_loop
    on_complete: run_final_tests
    hooks:
      pre:
        - log: "Starting TDD component loop..."
      post:
        - log: "All components implemented successfully"

  write_component_stub:
    type: step
    description: Claude writes interface/stub for ONE component
    command: |
      COMPONENT='{{.loop.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )

      # Create prompt with component context using envsubst
      export COMPONENT COMPONENT_NAME SPEC_CONTENT PLAN_CONTENT
      export FEATURE_ID="{{.inputs.feature_id}}"
      export AGENTS="{{.inputs.agents}}"
      export SKILLS="{{.inputs.skills}}"
      export LOOP_INDEX="{{.loop.Index1}}"
      export LOOP_LENGTH="{{.loop.Length}}"
      PROMPT=$(envsubst < .awf/prompts/implement/component-stub.md)

      claude -p "$PROMPT" \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: component_stub_output
      max_size: 5MB
    on_success: tdd_component_loop
    on_failure: tdd_component_loop
    hooks:
      pre:
        - log: "Component {{.loop.Index1}}/{{.loop.Length}}: Writing stub..."

  write_component_tests:
    type: step
    description: Claude writes tests for ONE component
    command: |
      COMPONENT='{{.loop.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )

      # Create prompt using envsubst
      export COMPONENT COMPONENT_NAME SPEC_CONTENT PLAN_CONTENT
      export FEATURE_ID="{{.inputs.feature_id}}"
      export AGENTS="{{.inputs.agents}}"
      export SKILLS="{{.inputs.skills}}"
      export LOOP_INDEX="{{.loop.Index1}}"
      export LOOP_LENGTH="{{.loop.Length}}"
      PROMPT=$(envsubst < .awf/prompts/implement/component-tests.md)

      claude -p "$PROMPT" \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: component_tests_output
      max_size: 5MB
    on_success: tdd_component_loop
    on_failure: tdd_component_loop
    hooks:
      pre:
        - log: "Component {{.loop.Index1}}/{{.loop.Length}}: Writing tests..."

  run_component_tests_red:
    type: step
    description: Run component tests - should fail (RED phase)
    command: |
      COMPONENT='{{.loop.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')

      # Get test files for this component
      TEST_FILES=$(echo "$COMPONENT" | jq -r '.tests[]' 2>/dev/null | tr '\n' ' ' || echo "")

      echo "=== RED phase for component: $COMPONENT_NAME ==="

      if [ -n "$TEST_FILES" ] && [ -f "$(echo $TEST_FILES | awk '{print $1}')" ]; then
        echo "Running tests: $TEST_FILES"
        go test -v $TEST_FILES 2>&1 || true
      else
        echo "No specific test files found, running all unit tests..."
        make test-unit 2>&1 || true
      fi

      echo "RED_PHASE_COMPLETE"
    timeout: 300s
    capture:
      stdout: component_red_output
    on_success: tdd_component_loop
    on_failure: tdd_component_loop
    hooks:
      pre:
        - log: "Component {{.loop.Index1}}/{{.loop.Length}}: RED phase..."

  component_green_loop:
    type: while
    description: Implement component until tests pass (max 3 attempts)
    while: "true"
    max_iterations: 3
    break_when: 'states.run_component_tests_green.output contains "TEST_EXIT_CODE=0"'
    body:
      - implement_component
      - run_component_fmt
      - run_component_tests_green
    on_complete: tdd_component_loop
    hooks:
      pre:
        - log: "Component {{.loop.Index1}}/{{.loop.Length}}: Starting GREEN loop..."
      post:
        - log: "Component {{.loop.Index1}}/{{.loop.Length}}: GREEN phase complete"

  implement_component:
    type: step
    description: Claude implements ONE component (GREEN phase)
    command: |
      COMPONENT='{{.loop.Parent.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )

      # Create prompt using envsubst
      export COMPONENT COMPONENT_NAME SPEC_CONTENT PLAN_CONTENT
      export FEATURE_ID="{{.inputs.feature_id}}"
      export AGENTS="{{.inputs.agents}}"
      export SKILLS="{{.inputs.skills}}"
      export LOOP_INDEX="{{.loop.Index1}}"
      export LOOP_PARENT_INDEX="{{.loop.Parent.Index1}}"
      export LOOP_PARENT_LENGTH="{{.loop.Parent.Length}}"
      PROMPT=$(envsubst < .awf/prompts/implement/component-impl.md)

      claude -p "$PROMPT" \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 900s
    capture:
      stdout: component_impl_output
      max_size: 10MB
    on_success: component_green_loop
    on_failure: component_green_loop
    hooks:
      pre:
        - log: "Component {{.loop.Parent.Index1}}: Implementing (attempt {{.loop.Index1}}/3)..."

  run_component_fmt:
    type: step
    description: Format Go code
    command: |
      go fmt ./...
      echo "FORMATTED"
    timeout: 60s
    capture:
      stdout: component_fmt_output
    on_success: component_green_loop
    on_failure: component_green_loop

  run_component_tests_green:
    type: step
    description: Run component tests - should pass (GREEN phase)
    command: |
      COMPONENT='{{.loop.Parent.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')

      TEST_FILES=$(echo "$COMPONENT" | jq -r '.tests[]' 2>/dev/null | tr '\n' ' ' || echo "")

      echo "=== GREEN phase for component: $COMPONENT_NAME (attempt {{.loop.Index1}}) ==="

      if [ -n "$TEST_FILES" ] && [ -f "$(echo $TEST_FILES | awk '{print $1}')" ]; then
        go test -v $TEST_FILES 2>&1
        TEST_EXIT_CODE=$?
      else
        make test-unit 2>&1
        TEST_EXIT_CODE=$?
      fi
      echo "TEST_EXIT_CODE=$TEST_EXIT_CODE"
      exit 0  # Always succeed - loop handles retry logic via break_when
    timeout: 300s
    capture:
      stdout: component_green_output
    on_success: component_green_loop
    on_failure: component_green_loop
    hooks:
      post:
        - log: "Component {{.loop.Parent.Index1}}: Tests attempt {{.loop.Index1}} complete"

  #==========================================================================
  # PHASE 5: FINAL VALIDATION
  #==========================================================================

  run_final_tests:
    type: step
    description: Run all unit tests to verify integration
    command: |
      echo "=== Running all unit tests after component implementation ==="
      make test-unit 2>&1
    timeout: 300s
    capture:
      stdout: final_tests_output
    on_success: run_lint_final
    on_failure: run_lint_final
    hooks:
      pre:
        - log: "Running final integration tests..."
      post:
        - log: "Final tests completed"

  run_lint_final:
    type: step
    description: Final lint check after tests pass
    command: make lint 2>&1
    timeout: 120s
    capture:
      stdout: lint_final_output
    on_success: write_feature_tests
    on_failure: write_feature_tests
    hooks:
      pre:
        - log: "Running final lint check..."

  #==========================================================================
  # PHASE 5.5: ISSUE-SPECIFIC FUNCTIONAL TESTS
  #==========================================================================

  write_feature_tests:
    type: step
    description: Claude writes comprehensive functional tests for this issue
    command: |
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )
      claude -p "$(cat .awf/prompts/implement/feature-tests.md)" \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: feature_tests_write_output
      max_size: 5MB
    on_success: run_feature_tests
    on_failure: run_feature_tests
    hooks:
      pre:
        - log: "Claude writing functional tests for {{.inputs.issue}}..."

  run_feature_tests:
    type: step
    description: Run issue-specific functional tests
    command: |
      ISSUE_INPUT="{{.inputs.issue}}"

      echo "=== Running functional tests for ${ISSUE_INPUT} ==="

      # Find test files tagged with this issue
      FEATURE_FILES=$(grep -l "// Feature: ${ISSUE_INPUT}\|// Issue: ${ISSUE_INPUT}\|// Bug: ${ISSUE_INPUT}" tests/integration/*_test.go 2>/dev/null || true)

      if [ -z "$FEATURE_FILES" ]; then
        echo "WARNING: No test files tagged with '// Feature: ${ISSUE_INPUT}' or '// Issue: ${ISSUE_INPUT}'"
        echo "Expected: Add appropriate comment after build tag"
        exit 0
      fi

      echo "Found tests in:"
      echo "$FEATURE_FILES"
      echo ""

      # Run only the tagged test files
      go test -v -tags=integration $FEATURE_FILES 2>&1

      echo ""
      echo "TESTS_COMPLETED"
    timeout: 300s
    capture:
      stdout: feature_tests_output
    on_success: set_done
    on_failure: set_done
    hooks:
      pre:
        - log: "Running functional tests for {{.inputs.issue}}..."
      post:
        - log: "Functional tests completed"

  #==========================================================================
  # PHASE 6: GITHUB STATUS + DOCUMENTATION
  #==========================================================================

  set_done:
    type: step
    description: Set GitHub issue status to Done and close issue
    command: |
      PROJECT_NUM=1

      # Get issue_url from find_spec (use heredoc for multiline JSON)
      SPEC_INFO=$(cat << 'JSONEOF'
      {{.states.find_spec.Output}}
      JSONEOF
      )
      ISSUE_URL=$(echo "$SPEC_INFO" | jq -r '.issue_url // empty')

      if [ -z "$ISSUE_URL" ]; then
        echo "SKIP_NO_ISSUE"
        exit 0
      fi

      # Get project info
      PROJECT_ID=$(gh project view $PROJECT_NUM --owner vanoix --format json | jq -r '.id')
      ITEMS=$(gh project item-list $PROJECT_NUM --owner vanoix --format json --limit 100)
      ITEM_ID=$(echo "$ITEMS" | jq -r ".items[] | select(.content.url==\"$ISSUE_URL\") | .id")

      if [ -z "$ITEM_ID" ]; then
        echo "SKIP_NOT_IN_PROJECT"
        exit 0
      fi

      # Get field IDs
      FIELDS=$(gh project field-list $PROJECT_NUM --owner vanoix --format json)
      STATUS_FIELD=$(echo "$FIELDS" | jq -r '.fields[] | select(.name=="Status") | .id')
      DONE_OPT=$(echo "$FIELDS" | jq -r '.fields[] | select(.name=="Status") | .options[] | select(.name=="Done") | .id')

      # Update status to Done
      gh project item-edit --id "$ITEM_ID" --project-id "$PROJECT_ID" \
        --field-id "$STATUS_FIELD" --single-select-option-id "$DONE_OPT" 2>/dev/null || true

      # Close the issue
      gh issue close "$ISSUE_URL" --repo vanoix/awf 2>/dev/null || true

      echo "DONE"
    timeout: 30s
    capture:
      stdout: done_result
    on_success: parallel_docs_claude
    on_failure: parallel_docs_claude
    hooks:
      pre:
        - log: "Setting issue status to Done..."
      post:
        - log: "Status: {{.states.set_done.Output}}"

  #--------------------------------------------------------------------------
  # Claude-based documentation updates (parallel)
  #--------------------------------------------------------------------------

  parallel_docs_claude:
    type: parallel
    description: Claude-based documentation updates
    parallel:
      - update_readme
      - update_changelog_full
    strategy: best_effort
    max_concurrent: 3
    on_success: update_memories
    on_failure: update_memories

  update_readme:
    type: step
    description: Claude updates README.md based on implemented issue
    command: |
      # Get staged files list
      STAGED_FILES=$(git diff --cached --name-only 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")

      # Get spec content from find_spec (GitHub issue, use heredoc for multiline JSON)
      SPEC_INFO=$(cat << 'JSONEOF'
      {{.states.find_spec.Output}}
      JSONEOF
      )
      SPEC_CONTENT=$(echo "$SPEC_INFO" | jq -r '.spec_content')

      # Read plan content
      PLAN_FILE=".specify/implementation/{{.inputs.issue}}/plan.md"
      PLAN_CONTENT=""
      if [ -f "$PLAN_FILE" ]; then
        PLAN_CONTENT=$(cat "$PLAN_FILE")
      fi

      claude -p "$(cat .awf/prompts/implement/docs.md)" \
        --allowedTools "Read,Edit" \
        --dangerously-skip-permissions \
        --output-format json 2>&1 || echo "README_UPDATE_FAILED"
    timeout: 180s
    capture:
      stdout: readme_update_output
      max_size: 1MB
    on_success: summary
    on_failure: summary

  update_changelog_full:
    type: step
    description: Generate and insert rich changelog entry
    command: |
      CHANGELOG_FILE="CHANGELOG.md"

      # Get issue info
      SPEC_INFO=$(cat << 'JSONEOF'
      {{.states.find_spec.Output}}
      JSONEOF
      )
      ISSUE_TYPE=$(echo "$SPEC_INFO" | jq -r '.issue_type')
      ISSUE_TITLE=$(echo "$SPEC_INFO" | jq -r '.title')

      # Check if already exists
      if grep -q "\*\*{{.inputs.issue}}\*\*\|#{{.inputs.issue}}" "$CHANGELOG_FILE" 2>/dev/null; then
        echo "ISSUE_ALREADY_IN_CHANGELOG"
        exit 0
      fi

      # Try to generate rich entry with Claude
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )

      ENTRY=$(claude -p "$(cat .awf/prompts/implement/changelog.md)" \
        --allowedTools "" \
        --dangerously-skip-permissions \
        --output-format text 2>/dev/null || echo "")

      # Fallback if Claude failed or returned empty
      if [ -z "$ENTRY" ]; then
        # Clean title for changelog
        TITLE=$(echo "$ISSUE_TITLE" | sed 's/^F[0-9]*: //' | sed 's/^bug: //')
        if [ -z "$TITLE" ]; then
          TITLE="Issue {{.inputs.issue}}"
        fi
        ENTRY="- **{{.inputs.issue}}**: $TITLE"
        FALLBACK=true
      fi

      # Determine section based on issue type
      case "$ISSUE_TYPE" in
        bug) SECTION="### Fixed" ;;
        *) SECTION="### Added" ;;
      esac

      # Insert after appropriate section under "[Unreleased]"
      if [ -f "$CHANGELOG_FILE" ]; then
        awk -v entry="$ENTRY" -v section="$SECTION" '
          /^## \[Unreleased\]/ { in_unreleased=1 }
          /^## \[/ && !/\[Unreleased\]/ { in_unreleased=0 }
          in_unreleased && $0 == section {
            print
            print entry
            next
          }
          { print }
        ' "$CHANGELOG_FILE" > "${CHANGELOG_FILE}.tmp" && mv "${CHANGELOG_FILE}.tmp" "$CHANGELOG_FILE"
      fi

      if [ "$FALLBACK" = "true" ]; then
        echo "CHANGELOG_UPDATED_FALLBACK"
      else
        echo "CHANGELOG_UPDATED"
      fi
    timeout: 90s
    capture:
      stdout: changelog_result
    on_success: summary
    on_failure: summary
    hooks:
      pre:
        - log: "Generating changelog entry..."
      post:
        - log: "Changelog: {{.states.update_changelog_full.Output}}"

  update_memories:
    type: step
    description: Update project memories via Claude
    command: |
      # Get info from find_spec (GitHub issue, use heredoc)
      SPEC_INFO=$(cat << 'JSONEOF'
      {{.states.find_spec.Output}}
      JSONEOF
      )
      ISSUE_TITLE=$(echo "$SPEC_INFO" | jq -r '.title')
      ISSUE_TYPE=$(echo "$SPEC_INFO" | jq -r '.issue_type')
      TITLE=$(echo "$ISSUE_TITLE" | sed 's/^F[0-9]*: //' | sed 's/^bug: //')

      # Try to extract version from issue labels or use unknown
      ISSUE_URL=$(echo "$SPEC_INFO" | jq -r '.issue_url')
      VERSION=$(gh issue view "$ISSUE_URL" --repo vanoix/awf --json labels --jq '.labels[].name | select(startswith("v"))' 2>/dev/null | head -1 || echo "unknown")

      claude -p "Update the project memories to reflect the implemented issue {{.inputs.issue}}.

      Use mcp__plugin_common_serena__edit_memory to update feature_roadmap:
      - Mark {{.inputs.issue}} as IMPLEMENTED in the $VERSION section

      Issue details:
      - ID: {{.inputs.issue}}
      - Type: $ISSUE_TYPE
      - Version: $VERSION
      - Title: $TITLE

      Confirm what was updated." \
        --allowedTools "mcp__plugin_common_serena__edit_memory,mcp__plugin_common_serena__read_memory" \
        --dangerously-skip-permissions \
        --output-format json 2>&1 || echo "MEMORY_UPDATE_SKIPPED"
    timeout: 120s
    capture:
      stdout: memory_result
    on_success: summary
    on_failure: summary
    hooks:
      pre:
        - log: "Updating project memories..."

  summary:
    type: step
    description: Generate implementation summary
    command: |
      # Get issue info
      SPEC_INFO=$(cat << 'JSONEOF'
      {{.states.find_spec.Output}}
      JSONEOF
      )
      ISSUE_TYPE=$(echo "$SPEC_INFO" | jq -r '.issue_type')

      echo "╔════════════════════════════════════════════════════════════════╗"
      echo "║           IMPLEMENTATION COMPLETE                              ║"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Issue: {{.inputs.issue}} (${ISSUE_TYPE})"
      echo "║ Agents: {{.inputs.agents}}"
      echo "║ Skills: {{.inputs.skills}}"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ TDD Results (Component-Based):"

      # Count components from extracted JSON
      COMPONENT_COUNT=$(echo '{{.states.extract_components.Output}}' | jq 'length' 2>/dev/null || echo "?")
      echo "║   Components: $COMPONENT_COUNT implemented"

      # Check final tests exit code
      FINAL_EXIT="{{.states.run_final_tests.ExitCode}}"
      if [ "$FINAL_EXIT" = "0" ]; then
        FINAL_RESULT="PASS (all tests passing)"
      else
        FINAL_RESULT="WARNING (some tests failing)"
      fi

      LINT_AFTER=$(cat << 'LINTEOF' | grep -q 'error\|warning' && echo 'WARNING' || echo 'PASS'
      {{.states.run_lint_final.Output}}
      LINTEOF
      )

      TESTS_STATUS=$(cat << 'FTEOF' | grep -q 'WARNING' && echo 'SKIPPED' || echo 'COMPLETED'
      {{.states.run_feature_tests.Output}}
      FTEOF
      )

      echo "║   Baseline: PASS (lint + tests)"
      echo "║   Final Tests: $FINAL_RESULT"
      echo "║   Final Lint: $LINT_AFTER"
      echo "║   Issue Tests: $TESTS_STATUS"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Updates:"
      echo "║   Plan: .specify/implementation/{{.inputs.issue}}/plan.md"
      echo "║   GitHub Issue: {{.states.set_done.Output}}"
      echo "║   README: {{.states.update_readme.Output}}"
      echo "║   CHANGELOG: {{.states.update_changelog_full.Output}}"

      MEMORY_STATUS=$(cat << 'MEMEOF' | grep -q 'SKIPPED' && echo 'SKIPPED' || echo 'UPDATED'
      {{.states.update_memories.Output}}
      MEMEOF
      )
      echo "║   Memory: $MEMORY_STATUS"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ NO COMMIT - Review changes and commit manually                 ║"
      echo "╚════════════════════════════════════════════════════════════════╝"
    timeout: 10s
    capture:
      stdout: summary_output
    on_success: done
    on_failure: done

  #==========================================================================
  # TERMINAL STATES
  #==========================================================================

  done:
    type: terminal
    status: success
    message: "Issue {{.inputs.issue}} implementation complete - review and commit manually"

  error_find_spec:
    type: terminal
    status: failure
    message: "Unable to find issue {{.inputs.issue}}"

  error_no_plan:
    type: terminal
    status: failure
    message: "Plan not found. Run 'awf run plan --input issue={{.inputs.issue}}' first"

  error_baseline:
    type: terminal
    status: failure
    message: "Baseline validation failed - fix lint/tests before implementing"

hooks:
  workflow_start:
    - log: "=== Implementing {{.inputs.issue}} with TDD ==="
  workflow_end:
    - log: "=== Implementation completed in {{.workflow.Duration}} ==="
  workflow_error:
    - log: "=== Implementation failed: {{.error.Message}} ==="
