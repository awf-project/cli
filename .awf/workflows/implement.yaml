# Feature Implementation Workflow
# Implements a feature following its plan using TDD (Strict TIDY approach).
# No commit - user decides when to commit after review.
#
# Usage:
#   awf run implement --input feature_id=F038
#   awf run implement --input feature_id=F038 --input spec_file=docs/plans/features/v0.2.0/F038-retry.md
#   awf run implement --input feature_id=F038 --input agents="go:golang-expert"

name: implement
description: Implement a feature using iterative TDD (component-by-component) with optional agents/skills
version: "2.0.0"
author: awf

inputs:
  - name: feature_id
    type: string
    description: Feature ID (e.g., F038)
    required: true
    validation:
      pattern: "^F[0-9]{3}$"

  - name: spec_file
    type: string
    description: Direct path to spec file (skips find if provided)
    required: false
    default: ""
    validation:
      file_exists: true
      file_extension: [".md"]

  - name: agents
    type: string
    description: Comma-separated agents to use (e.g., go:golang-expert,web:test-automator)
    required: false
    default: ""

  - name: skills
    type: string
    description: Comma-separated skills to use (e.g., go:go-testing,js:vitest)
    required: false
    default: ""

states:
  initial: find_spec

  #==========================================================================
  # PHASE 0: GIT BRANCH SETUP
  #==========================================================================

  find_spec:
    type: step
    description: Find specification
    command: |
      # Use spec_file if provided, otherwise find it
      if [ -n "{{.inputs.spec_file}}" ]; then
        SPEC_FILE="{{.inputs.spec_file}}"
      else
        SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      fi

      if [ -z "$SPEC_FILE" ]; then
        echo "ERROR: Spec not found for {{.inputs.feature_id}}"
        exit 1
      fi

      echo "$SPEC_FILE"
    timeout: 30s
    capture:
      stdout: spec_file
    on_success: create_branch
    on_failure: error_find_spec
    hooks:
      pre:
        - log: "Find spec..."
      post:
        - log: "Found spec {{.inputs.feature_id}}"

  create_branch:
    type: step
    description: Create or switch to feature branch
    command: |
      # Extract slug from filename (F038-prompt-storage.md -> prompt-storage)
      SLUG=$(basename "{{.states.find_spec.Output}}" .md | sed 's/^F[0-9]*-//')
      BRANCH="feature/{{.inputs.feature_id}}-${SLUG}"

      # Check if already on this branch
      CURRENT=$(git branch --show-current)
      if [ "$CURRENT" = "$BRANCH" ]; then
        echo "$BRANCH"
        exit 0
      fi

      # Check if branch exists locally
      if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
        git checkout "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi

      echo "$BRANCH"
    timeout: 30s
    capture:
      stdout: branch_name
    on_success: explore_codebase
    on_failure: error_branch
    hooks:
      pre:
        - log: "Creating/switching to feature branch..."
      post:
        - log: "On branch {{.states.create_branch.Output}}"

  #==========================================================================
  # PHASE 1: PLANNING
  #==========================================================================

  explore_codebase:
    type: step
    description: Claude explores codebase for implementation context
    command: |
      SPEC_CONTENT=$(cat "{{.states.find_spec.Output}}")
      claude -p "$(cat .awf/prompts/implement/explore.md)" \
        --allowedTools "Read,Grep,Glob" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 300s
    capture:
      stdout: exploration_raw
      max_size: 5MB
    on_success: parse_exploration
    on_failure: error_exploration
    hooks:
      pre:
        - log: "Claude exploring codebase..."
      post:
        - log: "Exploration complete"

  parse_exploration:
    type: step
    description: Extract exploration result and session ID
    command: |
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.explore_codebase.Output}}
      JSONEOF
      )

      # Try to parse as JSON, fallback to empty object
      if echo "$CLAUDE_OUTPUT" | jq -e '.' > /dev/null 2>&1; then
        echo "$CLAUDE_OUTPUT" | jq -c '{session_id: (.session_id // null), result: (.result // "No exploration result")}'
      else
        echo '{"session_id": null, "result": "Failed to parse exploration output"}'
      fi
    timeout: 10s
    capture:
      stdout: exploration_parsed
    on_success: create_plan
    on_failure: create_plan

  create_plan:
    type: step
    description: Claude creates implementation plan
    command: |
      SESSION_ID=$(cat << 'JSONEOF' | jq -r '.session_id // empty'
      {{.states.parse_exploration.Output}}
      JSONEOF
      )
      RESUME_FLAG=""
      if [ -n "$SESSION_ID" ]; then
        RESUME_FLAG="--resume $SESSION_ID"
      fi
      claude $RESUME_FLAG -p "$(cat .awf/prompts/implement/plan.md)" \
        --allowedTools "Read,Grep,Glob" \
        --output-format json
    timeout: 300s
    capture:
      stdout: plan_raw
      max_size: 5MB
    on_success: extract_plan
    on_failure: error_planning
    hooks:
      pre:
        - log: "Claude creating implementation plan..."

  extract_plan:
    type: step
    description: Extract plan content
    command: |
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.create_plan.Output}}
      JSONEOF
      )

      # Try to parse as JSON and extract result
      if echo "$CLAUDE_OUTPUT" | jq -e '.' > /dev/null 2>&1; then
        RESULT=$(echo "$CLAUDE_OUTPUT" | jq -r '.result // empty')
        if [ -n "$RESULT" ]; then
          echo "$RESULT"
        else
          echo "# No plan generated"
          echo ""
          echo "Claude did not return a result field."
        fi
      else
        echo "# Plan extraction failed"
        echo ""
        echo "Raw output was not valid JSON."
      fi
    timeout: 10s
    capture:
      stdout: plan_content
    on_success: save_plan
    on_failure: save_plan

  save_plan:
    type: step
    description: Save implementation plan
    command: |
      mkdir -p docs/plans/implementation
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"
      cat > "$PLAN_FILE" << 'AWF_PLAN_CONTENT_EOF'
      {{.states.extract_plan.Output}}
      AWF_PLAN_CONTENT_EOF
      echo "$PLAN_FILE"
    timeout: 10s
    capture:
      stdout: plan_file_path
    on_success: load_spec
    on_failure: load_spec
    hooks:
      post:
        - log: "Plan saved to {{.states.save_plan.Output}}"

  #==========================================================================
  # PHASE 2: VALIDATION BASELINE
  #==========================================================================

  load_spec:
    type: step
    description: Find and read feature spec
    command: |
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -z "$SPEC_FILE" ]; then
        echo "ERROR: Spec not found for {{.inputs.feature_id}}"
        exit 1
      fi
      cat "$SPEC_FILE"
    timeout: 10s
    capture:
      stdout: spec_content
      max_size: 1MB
    on_success: load_plan
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Loading spec for {{.inputs.feature_id}}..."

  load_plan:
    type: step
    description: Read implementation plan
    command: |
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"
      if [ ! -f "$PLAN_FILE" ]; then
        echo "ERROR: Plan not found at $PLAN_FILE"
        exit 1
      fi
      cat "$PLAN_FILE"
    timeout: 10s
    capture:
      stdout: plan_content
      max_size: 1MB
    on_success: extract_components
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Loading implementation plan..."

  extract_components:
    type: step
    description: Extract components JSON from implementation plan
    command: |
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"

      # Extract JSON block between ```json and ``` after ## Components
      COMPONENTS=$(awk '
        /^## Components/,/^## / {
          if (/```json/) { in_json=1; next }
          if (/```/ && in_json) { in_json=0; next }
          if (in_json) print
        }
      ' "$PLAN_FILE" | jq -c '.')

      if [ -z "$COMPONENTS" ] || [ "$COMPONENTS" = "null" ]; then
        echo "ERROR: No valid components JSON found in plan"
        echo "Expected: ## Components section with ```json block"
        exit 1
      fi

      # Validate it's an array
      if ! echo "$COMPONENTS" | jq -e 'type == "array"' > /dev/null 2>&1; then
        echo "ERROR: Components must be a JSON array"
        exit 1
      fi

      COMPONENT_COUNT=$(echo "$COMPONENTS" | jq 'length')
      echo "Found $COMPONENT_COUNT components" >&2
      echo "$COMPONENTS"
    timeout: 30s
    capture:
      stdout: components_json
    on_success: parallel_baseline
    on_failure: error_planning
    hooks:
      pre:
        - log: "Extracting components from plan..."
      post:
        - log: "Components extracted successfully"

  #==========================================================================
  # PHASE 2.5: BASELINE VALIDATION (PARALLEL)
  #==========================================================================

  parallel_baseline:
    type: parallel
    description: Run lint and tests baseline in parallel
    parallel:
      - run_lint_before
      - run_tests_before
    strategy: all_succeed
    max_concurrent: 2
    on_success: tdd_component_loop
    on_failure: error_baseline

  run_lint_before:
    type: step
    description: Lint baseline - must pass
    command: make lint
    timeout: 120s
    capture:
      stdout: lint_before_output
    on_success: tdd_component_loop
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Running lint baseline..."

  run_tests_before:
    type: step
    description: Tests baseline - must pass
    command: make test-unit
    timeout: 300s
    capture:
      stdout: tests_before_output
    on_success: tdd_component_loop
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Running tests baseline..."
      post:
        - log: "Baseline OK - proceeding with TDD"

  #==========================================================================
  # PHASE 3-4: TDD PER COMPONENT (for_each component → while retry)
  #==========================================================================

  tdd_component_loop:
    type: for_each
    description: TDD loop over each component (stub → tests → implement)
    items: "{{.states.extract_components.Output}}"
    max_iterations: 10
    body:
      - write_component_stub
      - write_component_tests
      - run_component_tests_red
      - component_green_loop
    on_complete: run_final_tests
    hooks:
      pre:
        - log: "Starting TDD for {{.loop.Length}} components..."
      post:
        - log: "All components implemented successfully"

  write_component_stub:
    type: step
    description: Claude writes interface/stub for ONE component
    command: |
      COMPONENT='{{.loop.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )

      # Create prompt with component context
      PROMPT=$(cat .awf/prompts/implement/component-stub.md | \
        sed "s|\$COMPONENT|$COMPONENT|g" | \
        sed "s|\$COMPONENT_NAME|$COMPONENT_NAME|g" | \
        sed "s|\$SPEC_CONTENT|$SPEC_CONTENT|g" | \
        sed "s|\$PLAN_CONTENT|$PLAN_CONTENT|g")

      claude -p "$PROMPT" \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: component_stub_output
      max_size: 5MB
    on_success: tdd_component_loop
    on_failure: tdd_component_loop
    hooks:
      pre:
        - log: "Component {{.loop.Index1}}/{{.loop.Length}}: Writing stub..."

  write_component_tests:
    type: step
    description: Claude writes tests for ONE component
    command: |
      COMPONENT='{{.loop.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )

      PROMPT=$(cat .awf/prompts/implement/component-tests.md | \
        sed "s|\$COMPONENT|$COMPONENT|g" | \
        sed "s|\$COMPONENT_NAME|$COMPONENT_NAME|g" | \
        sed "s|\$SPEC_CONTENT|$SPEC_CONTENT|g" | \
        sed "s|\$PLAN_CONTENT|$PLAN_CONTENT|g")

      claude -p "$PROMPT" \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: component_tests_output
      max_size: 5MB
    on_success: tdd_component_loop
    on_failure: tdd_component_loop
    hooks:
      pre:
        - log: "Component {{.loop.Index1}}/{{.loop.Length}}: Writing tests..."

  run_component_tests_red:
    type: step
    description: Run component tests - should fail (RED phase)
    command: |
      COMPONENT='{{.loop.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')

      # Get test files for this component
      TEST_FILES=$(echo "$COMPONENT" | jq -r '.tests[]' 2>/dev/null | tr '\n' ' ' || echo "")

      echo "=== RED phase for component: $COMPONENT_NAME ==="

      if [ -n "$TEST_FILES" ] && [ -f "$(echo $TEST_FILES | awk '{print $1}')" ]; then
        echo "Running tests: $TEST_FILES"
        go test -v $TEST_FILES 2>&1 || true
      else
        echo "No specific test files found, running all unit tests..."
        make test-unit 2>&1 || true
      fi

      echo "RED_PHASE_COMPLETE"
    timeout: 300s
    capture:
      stdout: component_red_output
    on_success: tdd_component_loop
    on_failure: tdd_component_loop
    hooks:
      pre:
        - log: "Component {{.loop.Index1}}/{{.loop.Length}}: RED phase..."

  component_green_loop:
    type: while
    description: Implement component until tests pass (max 3 attempts)
    while: "true"
    max_iterations: 3
    break_when: "states.run_component_tests_green.exit_code == 0"
    body:
      - implement_component
      - run_component_fmt
      - run_component_tests_green
    on_complete: tdd_component_loop
    hooks:
      pre:
        - log: "Component {{.loop.parent.Index1}}/{{.loop.parent.Length}}: Starting GREEN loop..."
      post:
        - log: "Component {{.loop.parent.Index1}}/{{.loop.parent.Length}}: GREEN phase complete"

  implement_component:
    type: step
    description: Claude implements ONE component (GREEN phase)
    command: |
      COMPONENT='{{.loop.parent.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )

      PROMPT=$(cat .awf/prompts/implement/component-impl.md | \
        sed "s|\$COMPONENT|$COMPONENT|g" | \
        sed "s|\$COMPONENT_NAME|$COMPONENT_NAME|g" | \
        sed "s|\$SPEC_CONTENT|$SPEC_CONTENT|g" | \
        sed "s|\$PLAN_CONTENT|$PLAN_CONTENT|g")

      claude -p "$PROMPT" \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 900s
    capture:
      stdout: component_impl_output
      max_size: 10MB
    on_success: component_green_loop
    on_failure: component_green_loop
    hooks:
      pre:
        - log: "Component {{.loop.parent.Index1}}: Implementing (attempt {{.loop.Index1}}/3)..."

  run_component_fmt:
    type: step
    description: Format Go code
    command: |
      go fmt ./...
      echo "FORMATTED"
    timeout: 60s
    capture:
      stdout: component_fmt_output
    on_success: component_green_loop
    on_failure: component_green_loop

  run_component_tests_green:
    type: step
    description: Run component tests - should pass (GREEN phase)
    command: |
      COMPONENT='{{.loop.parent.Item}}'
      COMPONENT_NAME=$(echo "$COMPONENT" | jq -r '.name')

      TEST_FILES=$(echo "$COMPONENT" | jq -r '.tests[]' 2>/dev/null | tr '\n' ' ' || echo "")

      echo "=== GREEN phase for component: $COMPONENT_NAME (attempt {{.loop.Index1}}) ==="

      if [ -n "$TEST_FILES" ] && [ -f "$(echo $TEST_FILES | awk '{print $1}')" ]; then
        go test -v $TEST_FILES 2>&1
      else
        make test-unit 2>&1
      fi
    timeout: 300s
    capture:
      stdout: component_green_output
    on_success: component_green_loop
    on_failure: component_green_loop
    hooks:
      post:
        - log: "Component {{.loop.parent.Index1}}: Tests attempt {{.loop.Index1}} complete"

  #==========================================================================
  # PHASE 5: FINAL VALIDATION
  #==========================================================================

  run_final_tests:
    type: step
    description: Run all unit tests to verify integration
    command: |
      echo "=== Running all unit tests after component implementation ==="
      make test-unit 2>&1
    timeout: 300s
    capture:
      stdout: final_tests_output
    on_success: run_lint_final
    on_failure: run_lint_final
    hooks:
      pre:
        - log: "Running final integration tests..."
      post:
        - log: "Final tests completed"

  run_lint_final:
    type: step
    description: Final lint check after tests pass
    command: make lint 2>&1
    timeout: 120s
    capture:
      stdout: lint_final_output
    on_success: write_feature_tests
    on_failure: write_feature_tests
    hooks:
      pre:
        - log: "Running final lint check..."

  #==========================================================================
  # PHASE 5.5: FEATURE-SPECIFIC FUNCTIONAL TESTS
  #==========================================================================

  write_feature_tests:
    type: step
    description: Claude writes comprehensive functional tests for this feature
    command: |
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )
      claude -p "$(cat .awf/prompts/implement/feature-tests.md)" \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: feature_tests_write_output
      max_size: 5MB
    on_success: run_feature_tests
    on_failure: run_feature_tests
    hooks:
      pre:
        - log: "Claude writing functional tests for {{.inputs.feature_id}}..."

  run_feature_tests:
    type: step
    description: Run feature-specific functional tests
    command: |
      FEATURE_ID="{{.inputs.feature_id}}"

      echo "=== Running functional tests for ${FEATURE_ID} ==="

      # Find test files tagged with this feature
      FEATURE_FILES=$(grep -l "// Feature: ${FEATURE_ID}" tests/integration/*_test.go 2>/dev/null || true)

      if [ -z "$FEATURE_FILES" ]; then
        echo "WARNING: No test files tagged with '// Feature: ${FEATURE_ID}'"
        echo "Expected: Add '// Feature: ${FEATURE_ID}' comment after build tag"
        exit 0
      fi

      echo "Found feature tests in:"
      echo "$FEATURE_FILES"
      echo ""

      # Run only the tagged test files
      go test -v -tags=integration $FEATURE_FILES 2>&1

      echo ""
      echo "FEATURE_TESTS_COMPLETED"
    timeout: 300s
    capture:
      stdout: feature_tests_output
    on_success: parallel_docs_shell
    on_failure: parallel_docs_shell
    hooks:
      pre:
        - log: "Running functional tests for {{.inputs.feature_id}}..."
      post:
        - log: "Feature tests completed"

  #==========================================================================
  # PHASE 6: DOCUMENTATION UPDATES
  #==========================================================================

  parallel_docs_shell:
    type: parallel
    description: Fast shell-based documentation updates
    parallel:
      - update_spec_status
      - update_kanban
    strategy: best_effort
    max_concurrent: 2
    on_success: parallel_docs_claude
    on_failure: parallel_docs_claude

  update_spec_status:
    type: step
    description: Update spec status to implemented
    command: |
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -n "$SPEC_FILE" ]; then
        # Update status (handle multiple possible values)
        sed -i -E 's/(\*\*Status\*\*): (backlog|planned|in_progress)/\1: implemented/g' "$SPEC_FILE"
        # Check all acceptance criteria checkboxes
        sed -i 's/- \[ \]/- [x]/g' "$SPEC_FILE"
        echo "Updated $SPEC_FILE"
      else
        echo "SPEC_UPDATE_SKIPPED"
      fi
    timeout: 10s
    capture:
      stdout: status_update_output
    on_success: parallel_docs_claude
    on_failure: parallel_docs_claude

  update_kanban:
    type: step
    description: Move feature from Backlog to Done in KANBAN.md
    command: |
      KANBAN_FILE="docs/plans/KANBAN.md"
      if [ ! -f "$KANBAN_FILE" ]; then
        echo "KANBAN_NOT_FOUND"
        exit 0
      fi

      # Find the feature line pattern (e.g., "- [F039](features/v0.1.0/F039-...")
      FEATURE_PATTERN="\[{{.inputs.feature_id}}\]"

      # Check if feature exists in file
      if ! grep -q "$FEATURE_PATTERN" "$KANBAN_FILE"; then
        echo "FEATURE_NOT_IN_KANBAN"
        exit 0
      fi

      # Extract the full feature line
      FEATURE_LINE=$(grep "$FEATURE_PATTERN" "$KANBAN_FILE" | head -1)

      # Remove from current location (Backlog section)
      sed -i "/$FEATURE_PATTERN/d" "$KANBAN_FILE"

      # Find which phase this feature belongs to
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -z "$SPEC_FILE" ]; then
        echo "KANBAN_SPEC_NOT_FOUND"
        exit 0
      fi

      # Extract version and map to phase
      VERSION=$(echo "$SPEC_FILE" | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+')
      case "$VERSION" in
        v0.1.0) PHASE_HEADER="### Phase 1 - MVP (v0.1.0)" ;;
        v0.2.0) PHASE_HEADER="### Phase 2 - Core Features (v0.2.0)" ;;
        v0.3.0) PHASE_HEADER="### Phase 3 - Advanced Features (v0.3.0)" ;;
        v0.4.0) PHASE_HEADER="### Phase 4 - Extensibility & AI (v0.4.0)" ;;
        v1.0.0) PHASE_HEADER="### Phase 5 - Interfaces (v1.0.0)" ;;
        *) PHASE_HEADER="### Phase 2 - Core Features (v0.2.0)" ;;
      esac

      # Check if phase section exists in Done
      if grep -q "^$PHASE_HEADER" "$KANBAN_FILE"; then
        # Phase exists - insert feature after header
        awk -v feat="$FEATURE_LINE" -v phase="$PHASE_HEADER" '
          /^## Done/ { in_done=1 }
          /^## Summary/ { in_done=0 }
          in_done && $0 == phase {
            print
            getline
            while ($0 ~ /^- \[F[0-9]+\]/) { print; getline }
            print feat
            next
          }
          { print }
        ' "$KANBAN_FILE" > "${KANBAN_FILE}.tmp" && mv "${KANBAN_FILE}.tmp" "$KANBAN_FILE"
      else
        # Phase doesn't exist in Done - create it after ## Done
        awk -v feat="$FEATURE_LINE" -v phase="$PHASE_HEADER" '
          /^## Done/ {
            print
            print ""
            print phase
            print feat
            next
          }
          { print }
        ' "$KANBAN_FILE" > "${KANBAN_FILE}.tmp" && mv "${KANBAN_FILE}.tmp" "$KANBAN_FILE"
      fi

      echo "KANBAN_UPDATED"
    timeout: 15s
    capture:
      stdout: kanban_update_output
    on_success: parallel_docs_claude
    on_failure: parallel_docs_claude

  #--------------------------------------------------------------------------
  # Claude-based documentation updates (parallel)
  #--------------------------------------------------------------------------

  parallel_docs_claude:
    type: parallel
    description: Claude-based documentation updates
    parallel:
      - update_readme
      - update_changelog_full
    strategy: best_effort
    max_concurrent: 3
    on_success: update_memories
    on_failure: update_memories

  update_readme:
    type: step
    description: Claude updates README.md based on implemented feature
    command: |
      # Get staged files list
      STAGED_FILES=$(git diff --cached --name-only 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")

      # Find spec and plan files
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"

      # Read spec content
      SPEC_CONTENT=""
      if [ -n "$SPEC_FILE" ] && [ -f "$SPEC_FILE" ]; then
        SPEC_CONTENT=$(cat "$SPEC_FILE")
      fi

      # Read plan content
      PLAN_CONTENT=""
      if [ -f "$PLAN_FILE" ]; then
        PLAN_CONTENT=$(cat "$PLAN_FILE")
      fi

      claude -p "$(cat .awf/prompts/implement/docs.md)" \
        --allowedTools "Read,Edit" \
        --dangerously-skip-permissions \
        --output-format json 2>&1 || echo "README_UPDATE_FAILED"
    timeout: 180s
    capture:
      stdout: readme_update_output
      max_size: 1MB
    on_success: summary
    on_failure: summary

  update_changelog_full:
    type: step
    description: Generate and insert rich changelog entry
    command: |
      CHANGELOG_FILE="CHANGELOG.md"

      # Check if already exists
      if grep -q "\*\*{{.inputs.feature_id}}\*\*" "$CHANGELOG_FILE" 2>/dev/null; then
        echo "FEATURE_ALREADY_IN_CHANGELOG"
        exit 0
      fi

      # Try to generate rich entry with Claude
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )

      ENTRY=$(claude -p "$(cat .awf/prompts/implement/changelog.md)" \
        --allowedTools "" \
        --dangerously-skip-permissions \
        --output-format text 2>/dev/null || echo "")

      # Fallback if Claude failed or returned empty
      if [ -z "$ENTRY" ] || ! echo "$ENTRY" | grep -q "{{.inputs.feature_id}}"; then
        SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
        TITLE=$(grep -m1 "^# {{.inputs.feature_id}}:" "$SPEC_FILE" 2>/dev/null | sed 's/^# {{.inputs.feature_id}}: //')
        if [ -z "$TITLE" ]; then
          TITLE=$(basename "$SPEC_FILE" .md | sed 's/^F[0-9]*-//' | tr '-' ' ')
        fi
        ENTRY="- **{{.inputs.feature_id}}**: $TITLE"
        FALLBACK=true
      fi

      # Insert after "### Added" under "[Unreleased]"
      if [ -f "$CHANGELOG_FILE" ]; then
        awk -v entry="$ENTRY" '
          /^## \[Unreleased\]/ { in_unreleased=1 }
          /^## \[/ && !/\[Unreleased\]/ { in_unreleased=0 }
          in_unreleased && /^### Added/ {
            print
            print entry
            next
          }
          { print }
        ' "$CHANGELOG_FILE" > "${CHANGELOG_FILE}.tmp" && mv "${CHANGELOG_FILE}.tmp" "$CHANGELOG_FILE"
      fi

      if [ "$FALLBACK" = "true" ]; then
        echo "CHANGELOG_UPDATED_FALLBACK"
      else
        echo "CHANGELOG_UPDATED"
      fi
    timeout: 90s
    capture:
      stdout: changelog_result
    on_success: summary
    on_failure: summary
    hooks:
      pre:
        - log: "Generating changelog entry..."
      post:
        - log: "Changelog: {{.states.update_changelog_full.Output}}"

  update_memories:
    type: step
    description: Update project memories via Claude
    command: |
      # Extract version from spec file path
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      VERSION=$(echo "$SPEC_FILE" | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
      TITLE=$(grep -m1 "^# {{.inputs.feature_id}}:" "$SPEC_FILE" 2>/dev/null | sed 's/^# {{.inputs.feature_id}}: //' || echo "Feature {{.inputs.feature_id}}")

      claude -p "Update the project memories to reflect the implemented feature {{.inputs.feature_id}}.

      Use mcp__plugin_common_serena__edit_memory to update feature_roadmap:
      - Mark {{.inputs.feature_id}} as IMPLEMENTED in the $VERSION section

      Feature details:
      - ID: {{.inputs.feature_id}}
      - Version: $VERSION
      - Title: $TITLE

      Confirm what was updated." \
        --allowedTools "mcp__plugin_common_serena__edit_memory,mcp__plugin_common_serena__read_memory" \
        --dangerously-skip-permissions \
        --output-format json 2>&1 || echo "MEMORY_UPDATE_SKIPPED"
    timeout: 120s
    capture:
      stdout: memory_result
    on_success: summary
    on_failure: summary
    hooks:
      pre:
        - log: "Updating project memories..."

  summary:
    type: step
    description: Generate implementation summary
    command: |
      echo "╔════════════════════════════════════════════════════════════════╗"
      echo "║           FEATURE IMPLEMENTATION COMPLETE                      ║"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Feature: {{.inputs.feature_id}}"
      echo "║ Agents: {{.inputs.agents}}"
      echo "║ Skills: {{.inputs.skills}}"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ TDD Results (Component-Based):"

      # Count components from extracted JSON
      COMPONENT_COUNT=$(echo '{{.states.extract_components.Output}}' | jq 'length' 2>/dev/null || echo "?")
      echo "║   Components: $COMPONENT_COUNT implemented"

      # Check final tests exit code
      FINAL_EXIT="{{.states.run_final_tests.ExitCode}}"
      if [ "$FINAL_EXIT" = "0" ]; then
        FINAL_RESULT="PASS (all tests passing)"
      else
        FINAL_RESULT="WARNING (some tests failing)"
      fi

      LINT_AFTER=$(cat << 'LINTEOF' | grep -q 'error\|warning' && echo 'WARNING' || echo 'PASS'
      {{.states.run_lint_final.Output}}
      LINTEOF
      )

      FEATURE_TESTS=$(cat << 'FTEOF' | grep -q 'NO_FEATURE_TESTS_FOUND\|WARNING' && echo 'SKIPPED' || echo 'COMPLETED'
      {{.states.run_feature_tests.Output}}
      FTEOF
      )

      echo "║   Baseline: PASS (lint + tests)"
      echo "║   Final Tests: $FINAL_RESULT"
      echo "║   Final Lint: $LINT_AFTER"
      echo "║   Feature Tests: $FEATURE_TESTS"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Documentation Updates:"
      echo "║   Spec Status: {{.states.update_spec_status.Output}}"
      echo "║   Plan: {{.states.save_plan.Output}}"
      echo "║   KANBAN: {{.states.update_kanban.Output}}"
      echo "║   README: {{.states.update_readme.Output}}"
      echo "║   CHANGELOG: {{.states.update_changelog_full.Output}}"

      MEMORY_STATUS=$(cat << 'MEMEOF' | grep -q 'SKIPPED' && echo 'SKIPPED' || echo 'UPDATED'
      {{.states.update_memories.Output}}
      MEMEOF
      )
      echo "║   Memory: $MEMORY_STATUS"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ NO COMMIT - Review changes and commit manually                 ║"
      echo "╚════════════════════════════════════════════════════════════════╝"
    timeout: 10s
    capture:
      stdout: summary_output
    on_success: done
    on_failure: done

  #==========================================================================
  # TERMINAL STATES
  #==========================================================================

  done:
    type: terminal
    status: success
    message: "Feature {{.inputs.feature_id}} implementation complete - review and commit manually"

  error_find_spec:
    type: terminal
    status: failure
    message: "Unable to find spec {{.inputs.feature_id}}"

  error_exploration:
    type: terminal
    status: failure
    message: "Claude exploration failed - check claude CLI is installed and authenticated"

  error_planning:
    type: terminal
    status: failure
    message: "Claude planning failed"

  error_baseline:
    type: terminal
    status: failure
    message: "Baseline validation failed - fix lint/tests before implementing"

  error_branch:
    type: terminal
    status: failure
    message: "Failed to create feature branch - check spec file exists"

hooks:
  workflow_start:
    - log: "=== Implementing {{.inputs.feature_id}} with TDD ==="
  workflow_end:
    - log: "=== Implementation completed in {{.workflow.Duration}} ==="
  workflow_error:
    - log: "=== Implementation failed: {{.error.Message}} ==="
