# Feature Implementation Workflow
# Implements a feature following its plan using TDD (Strict TIDY approach).
# No commit - user decides when to commit after review.
#
# Usage:
#   awf run implement --input feature_id=F038
#   awf run implement --input feature_id=F038 --input spec_file=docs/plans/features/v0.2.0/F038-retry.md
#   awf run implement --input feature_id=F038 --input agents="go:golang-expert"

name: implement
description: Implement a feature using TDD approach with optional agents/skills
version: "1.1.0"
author: awf

inputs:
  - name: feature_id
    type: string
    description: Feature ID (e.g., F038)
    required: true
    validation:
      pattern: "^F[0-9]{3}$"

  - name: spec_file
    type: string
    description: Direct path to spec file (skips find if provided)
    required: false
    default: ""
    validation:
      file_exists: true
      file_extension: [".md"]

  - name: agents
    type: string
    description: Comma-separated agents to use (e.g., go:golang-expert,web:test-automator)
    required: false
    default: ""

  - name: skills
    type: string
    description: Comma-separated skills to use (e.g., go:go-testing,js:vitest)
    required: false
    default: ""

states:
  initial: find_spec

  #==========================================================================
  # PHASE 0: GIT BRANCH SETUP
  #==========================================================================

  find_spec:
    type: step
    description: Find specification
    command: |
      # Use spec_file if provided, otherwise find it
      if [ -n "{{.inputs.spec_file}}" ]; then
        SPEC_FILE="{{.inputs.spec_file}}"
      else
        SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      fi

      if [ -z "$SPEC_FILE" ]; then
        echo "ERROR: Spec not found for {{.inputs.feature_id}}"
        exit 1
      fi

      echo "$SPEC_FILE"
    timeout: 30s
    capture:
      stdout: spec_file
    on_success: create_branch
    on_failure: error_find_spec
    hooks:
      pre:
        - log: "Find spec..."
      post:
        - log: "Found spec {{.inputs.feature_id}}"

  create_branch:
    type: step
    description: Create or switch to feature branch
    command: |
      # Extract slug from filename (F038-prompt-storage.md -> prompt-storage)
      SLUG=$(basename "{{.states.find_spec.Output}}" .md | sed 's/^F[0-9]*-//')
      BRANCH="feature/{{.inputs.feature_id}}-${SLUG}"

      # Check if already on this branch
      CURRENT=$(git branch --show-current)
      if [ "$CURRENT" = "$BRANCH" ]; then
        echo "$BRANCH"
        exit 0
      fi

      # Check if branch exists locally
      if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
        git checkout "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi

      echo "$BRANCH"
    timeout: 30s
    capture:
      stdout: branch_name
    on_success: explore_codebase
    on_failure: error_branch
    hooks:
      pre:
        - log: "Creating/switching to feature branch..."
      post:
        - log: "On branch {{.states.create_branch.Output}}"

  #==========================================================================
  # PHASE 1: PLANNING
  #==========================================================================

  explore_codebase:
    type: step
    description: Claude explores codebase for implementation context
    command: |
      SPEC_CONTENT=$(cat "{{.states.find_spec.Output}}")
      claude -p "You are exploring the awf (AI Workflow CLI) codebase to understand how to implement a new feature.

      ## Feature to implement
      $SPEC_CONTENT

      ## Your Task
      1. Explore the codebase architecture (hexagonal: domain/application/infrastructure/interfaces)
      2. Find similar features already implemented as reference
      3. Identify key interfaces and types that will be affected
      4. List 3-5 critical files that must be modified or created

      Output a structured exploration report:
      - Architecture layer(s) involved
      - Critical files with reasons
      - Pattern files to follow
      - Dependencies and risks" \
        --allowedTools "Read,Grep,Glob" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 300s
    capture:
      stdout: exploration_raw
      max_size: 5MB
    on_success: parse_exploration
    on_failure: error_exploration
    hooks:
      pre:
        - log: "Claude exploring codebase..."
      post:
        - log: "Exploration complete"

  parse_exploration:
    type: step
    description: Extract exploration result and session ID
    command: |
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.explore_codebase.Output}}
      JSONEOF
      )

      # Try to parse as JSON, fallback to empty object
      if echo "$CLAUDE_OUTPUT" | jq -e '.' > /dev/null 2>&1; then
        echo "$CLAUDE_OUTPUT" | jq -c '{session_id: (.session_id // null), result: (.result // "No exploration result")}'
      else
        echo '{"session_id": null, "result": "Failed to parse exploration output"}'
      fi
    timeout: 10s
    capture:
      stdout: exploration_parsed
    on_success: create_plan
    on_failure: create_plan

  create_plan:
    type: step
    description: Claude creates implementation plan
    command: |
      SESSION_ID=$(cat << 'JSONEOF' | jq -r '.session_id // empty'
      {{.states.parse_exploration.Output}}
      JSONEOF
      )
      RESUME_FLAG=""
      if [ -n "$SESSION_ID" ]; then
        RESUME_FLAG="--resume $SESSION_ID"
      fi
      claude $RESUME_FLAG -p "Based on your exploration, create a detailed implementation plan for {{.inputs.feature_id}}.

      ## Output Format (Markdown)
      # Implementation Plan: {{.inputs.feature_id}}

      ## Summary
      (2-3 sentences describing the approach)

      ## Implementation Steps
      1. Step description
         - File: path/to/file.go
         - Action: CREATE/MODIFY
         - Changes: specific changes needed

      ## Test Plan
      - Unit tests needed
      - Integration tests needed

      ## Files to Modify
      | File | Action | Complexity |
      |------|--------|------------|
      | path | CREATE/MODIFY | S/M/L |

      ## Risks
      - Risk and mitigation

      Be specific and actionable." \
        --allowedTools "Read,Grep,Glob" \
        --output-format json
    timeout: 300s
    capture:
      stdout: plan_raw
      max_size: 5MB
    on_success: extract_plan
    on_failure: error_planning
    hooks:
      pre:
        - log: "Claude creating implementation plan..."

  extract_plan:
    type: step
    description: Extract plan content
    command: |
      CLAUDE_OUTPUT=$(cat << 'JSONEOF'
      {{.states.create_plan.Output}}
      JSONEOF
      )

      # Try to parse as JSON and extract result
      if echo "$CLAUDE_OUTPUT" | jq -e '.' > /dev/null 2>&1; then
        RESULT=$(echo "$CLAUDE_OUTPUT" | jq -r '.result // empty')
        if [ -n "$RESULT" ]; then
          echo "$RESULT"
        else
          echo "# No plan generated"
          echo ""
          echo "Claude did not return a result field."
        fi
      else
        echo "# Plan extraction failed"
        echo ""
        echo "Raw output was not valid JSON."
      fi
    timeout: 10s
    capture:
      stdout: plan_content
    on_success: save_plan
    on_failure: save_plan

  save_plan:
    type: step
    description: Save implementation plan
    command: |
      mkdir -p docs/plans/implementation
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"
      cat > "$PLAN_FILE" << 'AWF_PLAN_CONTENT_EOF'
      {{.states.extract_plan.Output}}
      AWF_PLAN_CONTENT_EOF
      echo "$PLAN_FILE"
    timeout: 10s
    capture:
      stdout: plan_file_path
    on_success: load_spec
    on_failure: load_spec
    hooks:
      post:
        - log: "Plan saved to {{.states.save_plan.Output}}"

  #==========================================================================
  # PHASE 2: VALIDATION BASELINE
  #==========================================================================

  load_spec:
    type: step
    description: Find and read feature spec
    command: |
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -z "$SPEC_FILE" ]; then
        echo "ERROR: Spec not found for {{.inputs.feature_id}}"
        exit 1
      fi
      cat "$SPEC_FILE"
    timeout: 10s
    capture:
      stdout: spec_content
      max_size: 1MB
    on_success: load_plan
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Loading spec for {{.inputs.feature_id}}..."

  load_plan:
    type: step
    description: Read implementation plan
    command: |
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"
      if [ ! -f "$PLAN_FILE" ]; then
        echo "ERROR: Plan not found at $PLAN_FILE"
        exit 1
      fi
      cat "$PLAN_FILE"
    timeout: 10s
    capture:
      stdout: plan_content
      max_size: 1MB
    on_success: parallel_baseline
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Loading implementation plan..."

  #==========================================================================
  # PHASE 2.5: BASELINE VALIDATION (PARALLEL)
  #==========================================================================

  parallel_baseline:
    type: parallel
    description: Run lint and tests baseline in parallel
    parallel:
      - run_lint_before
      - run_tests_before
    strategy: all_succeed
    max_concurrent: 2
    on_success: write_interfaces
    on_failure: error_baseline

  run_lint_before:
    type: step
    description: Lint baseline - must pass
    command: make lint
    timeout: 120s
    capture:
      stdout: lint_before_output
    on_success: write_interfaces
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Running lint baseline..."

  run_tests_before:
    type: step
    description: Tests baseline - must pass
    command: make test-unit
    timeout: 300s
    capture:
      stdout: tests_before_output
    on_success: write_interfaces
    on_failure: error_baseline
    hooks:
      pre:
        - log: "Running tests baseline..."
      post:
        - log: "Baseline OK - proceeding with TDD"

  #==========================================================================
  # PHASE 3: TDD RED - Write interfaces then tests
  #==========================================================================

  write_interfaces:
    type: step
    description: Claude writes interfaces/types/stubs (code compiles but does nothing)
    command: |
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )
      claude -p "You are implementing feature {{.inputs.feature_id}} using strict TDD.

      ## PHASE: Write Interfaces/Types/Stubs (RED phase - step 1)

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Your Task
      Create ONLY the interfaces, types, and stub implementations needed for the tests to compile.
      The stubs should:
      - Return zero values or panic(\"not implemented\")
      - Allow tests to compile but fail when run
      - Follow the plan's file structure

      DO NOT implement the actual logic yet - just the skeleton.

      ## Available Agents
      {{.inputs.agents}}

      ## Available Skills
      {{.inputs.skills}}

      If agents/skills are specified, use them via Task/Skill tools when appropriate." \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: interfaces_output
      max_size: 5MB
    on_success: write_tests
    on_failure: write_tests
    hooks:
      pre:
        - log: "Claude writing interfaces/stubs..."

  write_tests:
    type: step
    description: Claude writes tests using the interfaces
    command: |
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )
      claude -p "You are implementing feature {{.inputs.feature_id}} using strict TDD.

      ## PHASE: Write Tests (RED phase - step 2)

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Your Task
      Write comprehensive tests based on the Test Plan section:
      - Unit tests for each component
      - Integration tests if specified
      - Tests should use the interfaces/stubs created in the previous step
      - Tests MUST compile (use existing interfaces)
      - Tests SHOULD fail when run (stubs don't implement logic)

      Follow the project's testing conventions (table-driven tests, testify).

      ## Available Agents
      {{.inputs.agents}}

      ## Available Skills
      {{.inputs.skills}}

      If agents/skills are specified, use them via Task/Skill tools when appropriate." \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: tests_output
      max_size: 5MB
    on_success: run_tests_red
    on_failure: run_tests_red
    hooks:
      pre:
        - log: "Claude writing tests..."

  run_tests_red:
    type: step
    description: Run tests - should fail (RED phase)
    command: make test-unit 2>&1 || true
    timeout: 300s
    capture:
      stdout: tests_red_output
    on_success: tdd_green_loop
    on_failure: tdd_green_loop
    hooks:
      pre:
        - log: "Running tests (expecting failure - RED phase)..."
      post:
        - log: "RED phase complete - proceeding to implementation"

  #==========================================================================
  # PHASE 4: TDD GREEN - Implementation with retry loop
  #==========================================================================

  tdd_green_loop:
    type: while
    description: TDD GREEN retry loop - implement until tests pass
    while: "true"
    max_iterations: 3
    break_when: "states.run_tests_green.exit_code == 0"
    body:
      - implement_feature
      - run_fmt
      - run_tests_green
    on_complete: run_lint_final
    hooks:
      pre:
        - log: "Starting TDD GREEN loop (max 3 iterations)..."
      post:
        - log: "TDD GREEN loop completed"

  implement_feature:
    type: step
    description: Claude implements the feature (GREEN phase)
    command: |
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )
      claude -p "You are implementing feature {{.inputs.feature_id}} using strict TDD.

      ## PHASE: Implementation (GREEN phase) - Attempt {{.loop.Index1}}/3

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Your Task
      Implement the actual logic to make all tests pass:
      - Replace stub implementations with real code
      - Follow the implementation steps from the plan
      - Ensure code compiles and passes lint
      - Make tests pass (GREEN)
      {{if not .loop.First}}
      ## IMPORTANT: Previous attempt failed
      This is retry attempt {{.loop.Index1}}. The previous implementation did not pass all tests.
      Review the test output and fix the issues before proceeding.
      {{end}}

      ## Available Agents
      {{.inputs.agents}}

      ## Available Skills
      {{.inputs.skills}}

      If agents/skills are specified, use them via Task/Skill tools when appropriate.
      For example, use go:golang-expert for complex Go patterns." \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 900s
    capture:
      stdout: implement_output
      max_size: 10MB
    on_success: tdd_green_loop
    on_failure: tdd_green_loop
    hooks:
      pre:
        - log: "Claude implementing feature..."

  run_fmt:
    type: step
    description: Format Go code before validation
    command: |
      go fmt ./...
      echo "STATUS:FORMATTED"
    timeout: 60s
    capture:
      stdout: fmt_output
    on_success: tdd_green_loop
    on_failure: tdd_green_loop
    hooks:
      pre:
        - log: "Formatting Go code..."
      post:
        - log: "Code formatted"

  #==========================================================================
  # PHASE 5: VALIDATION (inside tdd_green_loop)
  #==========================================================================

  run_tests_green:
    type: step
    description: Run tests - should pass (GREEN phase)
    command: make test-unit 2>&1
    timeout: 300s
    capture:
      stdout: tests_green_output
    on_success: tdd_green_loop
    on_failure: tdd_green_loop
    hooks:
      pre:
        - log: "Running tests [attempt {{.loop.Index1}}]..."
      post:
        - log: "Tests completed"

  run_lint_final:
    type: step
    description: Final lint check after tests pass
    command: make lint 2>&1
    timeout: 120s
    capture:
      stdout: lint_final_output
    on_success: write_feature_tests
    on_failure: write_feature_tests
    hooks:
      pre:
        - log: "Running final lint check..."

  #==========================================================================
  # PHASE 5.5: FEATURE-SPECIFIC FUNCTIONAL TESTS
  #==========================================================================

  write_feature_tests:
    type: step
    description: Claude writes comprehensive functional tests for this feature
    command: |
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )
      claude -p "You are writing functional tests for feature {{.inputs.feature_id}}.

      ## PHASE: Feature Functional Tests

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Your Task
      Write comprehensive **functional tests** that validate the feature works end-to-end:

      ### Test Categories Required
      1. **Happy Path Tests** - Normal usage scenarios work correctly
      2. **Edge Cases** - Boundary conditions, empty inputs, max values
      3. **Error Handling** - Invalid inputs produce correct errors
      4. **Integration** - Feature works with other components

      ### Test Structure
      - File: tests/integration/{component}_test.go (match existing file if extending)
      - Build tag: //go:build integration
      - Naming: Test{Component}_{Action}_Integration (e.g., TestTemplateService_ExpandWorkflow_Integration)
      - REQUIRED: Add file-level comment '// Feature: {{.inputs.feature_id}}'
      - Use testify/require for assertions
      - Table-driven tests where appropriate
      - Real fixtures in tests/fixtures/

      ### Example Structure
      \`\`\`go
      //go:build integration

      // Feature: {{.inputs.feature_id}}
      package integration

      import (
          \"testing\"
          \"github.com/stretchr/testify/require\"
      )

      func TestComponent_HappyPath_Integration(t *testing.T) {
          // Setup real dependencies
          // Execute feature end-to-end
          // Assert expected behavior
      }
      \`\`\`

      ### Requirements
      - Tests MUST compile and run
      - Tests MUST use the actual implementation (not mocks)
      - Tests MUST cover acceptance criteria from spec
      - Create necessary fixtures in tests/fixtures/

      ## Available Agents
      {{.inputs.agents}}

      ## Available Skills
      {{.inputs.skills}}" \
        --allowedTools "Read,Grep,Glob,Edit,Write,Bash,Task" \
        --dangerously-skip-permissions \
        --output-format json
    timeout: 600s
    capture:
      stdout: feature_tests_write_output
      max_size: 5MB
    on_success: run_feature_tests
    on_failure: run_feature_tests
    hooks:
      pre:
        - log: "Claude writing functional tests for {{.inputs.feature_id}}..."

  run_feature_tests:
    type: step
    description: Run feature-specific functional tests
    command: |
      FEATURE_ID="{{.inputs.feature_id}}"

      echo "=== Running functional tests for ${FEATURE_ID} ==="

      # Find test files tagged with this feature
      FEATURE_FILES=$(grep -l "// Feature: ${FEATURE_ID}" tests/integration/*_test.go 2>/dev/null || true)

      if [ -z "$FEATURE_FILES" ]; then
        echo "WARNING: No test files tagged with '// Feature: ${FEATURE_ID}'"
        echo "Expected: Add '// Feature: ${FEATURE_ID}' comment after build tag"
        exit 0
      fi

      echo "Found feature tests in:"
      echo "$FEATURE_FILES"
      echo ""

      # Run only the tagged test files
      go test -v -tags=integration $FEATURE_FILES 2>&1

      echo ""
      echo "FEATURE_TESTS_COMPLETED"
    timeout: 300s
    capture:
      stdout: feature_tests_output
    on_success: parallel_docs_shell
    on_failure: parallel_docs_shell
    hooks:
      pre:
        - log: "Running functional tests for {{.inputs.feature_id}}..."
      post:
        - log: "Feature tests completed"

  #==========================================================================
  # PHASE 6: DOCUMENTATION UPDATES
  #==========================================================================

  parallel_docs_shell:
    type: parallel
    description: Fast shell-based documentation updates
    parallel:
      - update_spec_status
      - update_kanban
    strategy: best_effort
    max_concurrent: 2
    on_success: parallel_docs_claude
    on_failure: parallel_docs_claude

  update_spec_status:
    type: step
    description: Update spec status to implemented
    command: |
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -n "$SPEC_FILE" ]; then
        # Update status (handle multiple possible values)
        sed -i -E 's/(\*\*Status\*\*): (backlog|planned|in_progress)/\1: implemented/g' "$SPEC_FILE"
        # Check all acceptance criteria checkboxes
        sed -i 's/- \[ \]/- [x]/g' "$SPEC_FILE"
        echo "Updated $SPEC_FILE"
      else
        echo "SPEC_UPDATE_SKIPPED"
      fi
    timeout: 10s
    capture:
      stdout: status_update_output
    on_success: parallel_docs_claude
    on_failure: parallel_docs_claude

  update_kanban:
    type: step
    description: Move feature from Backlog to Done in KANBAN.md
    command: |
      KANBAN_FILE="docs/plans/KANBAN.md"
      if [ ! -f "$KANBAN_FILE" ]; then
        echo "KANBAN_NOT_FOUND"
        exit 0
      fi

      # Find the feature line pattern (e.g., "- [F039](features/v0.1.0/F039-...")
      FEATURE_PATTERN="\[{{.inputs.feature_id}}\]"

      # Check if feature exists in file
      if ! grep -q "$FEATURE_PATTERN" "$KANBAN_FILE"; then
        echo "FEATURE_NOT_IN_KANBAN"
        exit 0
      fi

      # Extract the full feature line
      FEATURE_LINE=$(grep "$FEATURE_PATTERN" "$KANBAN_FILE" | head -1)

      # Remove from current location (Backlog section)
      sed -i "/$FEATURE_PATTERN/d" "$KANBAN_FILE"

      # Find which phase this feature belongs to
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      if [ -z "$SPEC_FILE" ]; then
        echo "KANBAN_SPEC_NOT_FOUND"
        exit 0
      fi

      # Extract version and map to phase
      VERSION=$(echo "$SPEC_FILE" | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+')
      case "$VERSION" in
        v0.1.0) PHASE_HEADER="### Phase 1 - MVP (v0.1.0)" ;;
        v0.2.0) PHASE_HEADER="### Phase 2 - Core Features (v0.2.0)" ;;
        v0.3.0) PHASE_HEADER="### Phase 3 - Advanced Features (v0.3.0)" ;;
        v0.4.0) PHASE_HEADER="### Phase 4 - Extensibility & AI (v0.4.0)" ;;
        v1.0.0) PHASE_HEADER="### Phase 5 - Interfaces (v1.0.0)" ;;
        *) PHASE_HEADER="### Phase 2 - Core Features (v0.2.0)" ;;
      esac

      # Check if phase section exists in Done
      if grep -q "^$PHASE_HEADER" "$KANBAN_FILE"; then
        # Phase exists - insert feature after header
        awk -v feat="$FEATURE_LINE" -v phase="$PHASE_HEADER" '
          /^## Done/ { in_done=1 }
          /^## Summary/ { in_done=0 }
          in_done && $0 == phase {
            print
            getline
            while ($0 ~ /^- \[F[0-9]+\]/) { print; getline }
            print feat
            next
          }
          { print }
        ' "$KANBAN_FILE" > "${KANBAN_FILE}.tmp" && mv "${KANBAN_FILE}.tmp" "$KANBAN_FILE"
      else
        # Phase doesn't exist in Done - create it after ## Done
        awk -v feat="$FEATURE_LINE" -v phase="$PHASE_HEADER" '
          /^## Done/ {
            print
            print ""
            print phase
            print feat
            next
          }
          { print }
        ' "$KANBAN_FILE" > "${KANBAN_FILE}.tmp" && mv "${KANBAN_FILE}.tmp" "$KANBAN_FILE"
      fi

      echo "KANBAN_UPDATED"
    timeout: 15s
    capture:
      stdout: kanban_update_output
    on_success: parallel_docs_claude
    on_failure: parallel_docs_claude

  #--------------------------------------------------------------------------
  # Claude-based documentation updates (parallel)
  #--------------------------------------------------------------------------

  parallel_docs_claude:
    type: parallel
    description: Claude-based documentation updates
    parallel:
      - update_readme
      - update_changelog_full
    strategy: best_effort
    max_concurrent: 3
    on_success: update_memories
    on_failure: update_memories

  update_readme:
    type: step
    description: Claude updates README.md based on implemented feature
    command: |
      # Get staged files list
      STAGED_FILES=$(git diff --cached --name-only 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")

      # Find spec and plan files
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      PLAN_FILE="docs/plans/implementation/{{.inputs.feature_id}}-plan.md"

      # Read spec content
      SPEC_CONTENT=""
      if [ -n "$SPEC_FILE" ] && [ -f "$SPEC_FILE" ]; then
        SPEC_CONTENT=$(cat "$SPEC_FILE")
      fi

      # Read plan content
      PLAN_CONTENT=""
      if [ -f "$PLAN_FILE" ]; then
        PLAN_CONTENT=$(cat "$PLAN_FILE")
      fi

      claude -p "Update the README.md to reflect the newly implemented feature {{.inputs.feature_id}}.

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Staged/Modified Files
      $STAGED_FILES

      ## Your Task
      1. Read the current README.md
      2. Update the Roadmap section:
         - Check the checkbox for this feature (change '- [ ]' to '- [x]')
         - If the feature is not listed, add it to the appropriate phase section
      3. If the feature adds new CLI commands or flags:
         - Update the Commands table
         - Update the relevant Flags sections
      4. If the feature changes workflow syntax:
         - Update the Workflow Syntax section
      5. Keep changes minimal and focused on this feature only

      Output 'README_UPDATED' when done, or 'README_NO_CHANGES' if no updates needed." \
        --allowedTools "Read,Edit" \
        --dangerously-skip-permissions \
        --output-format json 2>&1 || echo "README_UPDATE_FAILED"
    timeout: 180s
    capture:
      stdout: readme_update_output
      max_size: 1MB
    on_success: summary
    on_failure: summary

  update_changelog_full:
    type: step
    description: Generate and insert rich changelog entry
    command: |
      CHANGELOG_FILE="CHANGELOG.md"

      # Check if already exists
      if grep -q "\*\*{{.inputs.feature_id}}\*\*" "$CHANGELOG_FILE" 2>/dev/null; then
        echo "FEATURE_ALREADY_IN_CHANGELOG"
        exit 0
      fi

      # Try to generate rich entry with Claude
      SPEC_CONTENT=$(cat << 'SPECEOF'
      {{.states.load_spec.Output}}
      SPECEOF
      )
      PLAN_CONTENT=$(cat << 'PLANEOF'
      {{.states.load_plan.Output}}
      PLANEOF
      )

      ENTRY=$(claude -p "Generate a CHANGELOG entry for feature {{.inputs.feature_id}}.

      ## Feature Spec
      $SPEC_CONTENT

      ## Implementation Plan
      $PLAN_CONTENT

      ## Your Task
      Create a rich changelog entry following this format:
      - **{{.inputs.feature_id}}**: Short title (from spec H1)
        - Key feature/capability 1 (use backticks for code terms)
        - Key feature/capability 2
        - Key feature/capability 3
        - (3-5 bullets max, focus on user-facing changes)

      Rules:
      1. Title: Extract from spec H1, keep concise (5-10 words)
      2. Bullets: Focus on WHAT it does, not HOW it's implemented
      3. Use backticks for: commands, flags, config keys, code terms
      4. Skip implementation details (internal refactors, test changes)
      5. If breaking change: add 'BREAKING:' prefix to relevant bullet

      Output ONLY the markdown entry, nothing else." \
        --allowedTools "" \
        --dangerously-skip-permissions \
        --output-format text 2>/dev/null || echo "")

      # Fallback if Claude failed or returned empty
      if [ -z "$ENTRY" ] || ! echo "$ENTRY" | grep -q "{{.inputs.feature_id}}"; then
        SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
        TITLE=$(grep -m1 "^# {{.inputs.feature_id}}:" "$SPEC_FILE" 2>/dev/null | sed 's/^# {{.inputs.feature_id}}: //')
        if [ -z "$TITLE" ]; then
          TITLE=$(basename "$SPEC_FILE" .md | sed 's/^F[0-9]*-//' | tr '-' ' ')
        fi
        ENTRY="- **{{.inputs.feature_id}}**: $TITLE"
        FALLBACK=true
      fi

      # Insert after "### Added" under "[Unreleased]"
      if [ -f "$CHANGELOG_FILE" ]; then
        awk -v entry="$ENTRY" '
          /^## \[Unreleased\]/ { in_unreleased=1 }
          /^## \[/ && !/\[Unreleased\]/ { in_unreleased=0 }
          in_unreleased && /^### Added/ {
            print
            print entry
            next
          }
          { print }
        ' "$CHANGELOG_FILE" > "${CHANGELOG_FILE}.tmp" && mv "${CHANGELOG_FILE}.tmp" "$CHANGELOG_FILE"
      fi

      if [ "$FALLBACK" = "true" ]; then
        echo "CHANGELOG_UPDATED_FALLBACK"
      else
        echo "CHANGELOG_UPDATED"
      fi
    timeout: 90s
    capture:
      stdout: changelog_result
    on_success: summary
    on_failure: summary
    hooks:
      pre:
        - log: "Generating changelog entry..."
      post:
        - log: "Changelog: {{.states.update_changelog_full.Output}}"

  update_memories:
    type: step
    description: Update project memories via Claude
    command: |
      # Extract version from spec file path
      SPEC_FILE=$(find docs/plans/features -name "{{.inputs.feature_id}}-*.md" -type f | head -1)
      VERSION=$(echo "$SPEC_FILE" | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
      TITLE=$(grep -m1 "^# {{.inputs.feature_id}}:" "$SPEC_FILE" 2>/dev/null | sed 's/^# {{.inputs.feature_id}}: //' || echo "Feature {{.inputs.feature_id}}")

      claude -p "Update the project memories to reflect the implemented feature {{.inputs.feature_id}}.

      Use mcp__plugin_common_serena__edit_memory to update feature_roadmap:
      - Mark {{.inputs.feature_id}} as IMPLEMENTED in the $VERSION section

      Feature details:
      - ID: {{.inputs.feature_id}}
      - Version: $VERSION
      - Title: $TITLE

      Confirm what was updated." \
        --allowedTools "mcp__plugin_common_serena__edit_memory,mcp__plugin_common_serena__read_memory" \
        --dangerously-skip-permissions \
        --output-format json 2>&1 || echo "MEMORY_UPDATE_SKIPPED"
    timeout: 120s
    capture:
      stdout: memory_result
    on_success: summary
    on_failure: summary
    hooks:
      pre:
        - log: "Updating project memories..."

  summary:
    type: step
    description: Generate implementation summary
    command: |
      echo "╔════════════════════════════════════════════════════════════════╗"
      echo "║           FEATURE IMPLEMENTATION COMPLETE                      ║"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Feature: {{.inputs.feature_id}}"
      echo "║ Agents: {{.inputs.agents}}"
      echo "║ Skills: {{.inputs.skills}}"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ TDD Results:"
      # Check exit codes stored in states (CamelCase for Go templates)
      RED_EXIT="{{.states.run_tests_red.ExitCode}}"
      GREEN_EXIT="{{.states.run_tests_green.ExitCode}}"
      if [ "$RED_EXIT" != "0" ]; then
        RED_RESULT="OK (tests failed as expected)"
      else
        RED_RESULT="WARNING (tests passed, should have failed)"
      fi
      if [ "$GREEN_EXIT" = "0" ]; then
        GREEN_RESULT="OK (tests passing)"
      else
        GREEN_RESULT="WARNING (tests still failing)"
      fi
      LINT_AFTER=$(cat << 'LINTEOF' | grep -q 'LINT_WARNING' && echo 'WARNING' || echo 'PASS'
      {{.states.run_lint_final.Output}}
      LINTEOF
      )
      FEATURE_TESTS=$(cat << 'FTEOF' | grep -q 'NO_FEATURE_TESTS_FOUND' && echo 'SKIPPED (no tests found)' || echo 'COMPLETED'
      {{.states.run_feature_tests.Output}}
      FTEOF
      )
      echo "║   Baseline Lint: PASS"
      echo "║   Baseline Tests: PASS"
      echo "║   RED Phase: $RED_RESULT"
      echo "║   GREEN Phase: $GREEN_RESULT"
      echo "║   Final Lint: $LINT_AFTER"
      echo "║   Feature Tests: $FEATURE_TESTS"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ Documentation Updates:"
      echo "║   Spec Status: {{.states.update_spec_status.Output}}"
      echo "║   Plan: {{.states.save_plan.Output}}"
      echo "║   KANBAN: {{.states.update_kanban.Output}}"
      echo "║   README: {{.states.update_readme.Output}}"
      echo "║   CHANGELOG: {{.states.update_changelog_full.Output}}"
      MEMORY_STATUS=$(cat << 'MEMEOF' | grep -q 'SKIPPED' && echo 'SKIPPED' || echo 'UPDATED'
      {{.states.update_memories.Output}}
      MEMEOF
      )
      echo "║   Memory: $MEMORY_STATUS"
      echo "╠════════════════════════════════════════════════════════════════╣"
      echo "║ NO COMMIT - Review changes and commit manually                 ║"
      echo "╚════════════════════════════════════════════════════════════════╝"
    timeout: 10s
    capture:
      stdout: summary_output
    on_success: done
    on_failure: done

  #==========================================================================
  # TERMINAL STATES
  #==========================================================================

  done:
    type: terminal
    status: success
    message: "Feature {{.inputs.feature_id}} implementation complete - review and commit manually"

  error_find_spec:
    type: terminal
    status: failure
    message: "Unable to find spec {{.inputs.feature_id}}"

  error_exploration:
    type: terminal
    status: failure
    message: "Claude exploration failed - check claude CLI is installed and authenticated"

  error_planning:
    type: terminal
    status: failure
    message: "Claude planning failed"

  error_baseline:
    type: terminal
    status: failure
    message: "Baseline validation failed - fix lint/tests before implementing"

  error_branch:
    type: terminal
    status: failure
    message: "Failed to create feature branch - check spec file exists"

hooks:
  workflow_start:
    - log: "=== Implementing {{.inputs.feature_id}} with TDD ==="
  workflow_end:
    - log: "=== Implementation completed in {{.workflow.Duration}} ==="
  workflow_error:
    - log: "=== Implementation failed: {{.error.Message}} ==="
