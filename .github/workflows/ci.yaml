name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run tests with race detector
        run: go test -race ./...

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags "-X github.com/awf-project/awf/internal/interfaces/cli.Version=${VERSION} \
            -X github.com/awf-project/awf/internal/interfaces/cli.Commit=${COMMIT} \
            -X github.com/awf-project/awf/internal/interfaces/cli.BuildDate=${BUILD_DATE}" \
            -o awf-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/awf

      - uses: actions/upload-artifact@v6
        with:
          name: awf-${{ matrix.goos }}-${{ matrix.goarch }}
          path: awf-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 5
