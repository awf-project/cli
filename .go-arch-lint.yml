version: 3
workdir: internal

allow:
  depOnAnyVendor: false
  deepScan: false

excludeFiles:
  - ".*_test\\.go$"

exclude:
  - ../tests

commonVendors:
  - go-stdlib

commonComponents:
  - pkg-expression
  - pkg-interpolation
  - pkg-plugin-sdk
  - pkg-retry
  - pkg-stringutil
  - pkg-validation
  - pkg-httpx
  - pkg-output

vendors:
  go-stdlib:
    in:
      - fmt
      - context
      - encoding/**
      - errors
      - io
      - io/**
      - net/**
      - os
      - os/**
      - path
      - path/**
      - regexp
      - runtime
      - strings
      - strconv
      - sync
      - sync/**
      - time
      - log
      - log/**
      - slices
      - sort
      - math/**
      - bytes
      - bufio
      - database/**
      - embed
      - text/**
      - testing
      - testing/**
      - syscall

  go-sync:
    in:
      - golang.org/x/sync/**
      - golang.org/x/time/**

  yaml:
    in:
      - gopkg.in/yaml.v3

  cobra:
    in:
      - github.com/spf13/cobra
      - github.com/spf13/pflag

  zap:
    in:
      - go.uber.org/zap
      - go.uber.org/zap/**

  color:
    in:
      - github.com/fatih/color

  uuid:
    in:
      - github.com/google/uuid

  testify:
    in:
      - github.com/stretchr/testify/**

  progressbar:
    in:
      - github.com/schollz/progressbar/**

  expr:
    in:
      - github.com/expr-lang/expr
      - github.com/expr-lang/expr/**

  sqlite:
    in:
      - github.com/mattn/go-sqlite3
      - modernc.org/sqlite

  tiktoken:
    in:
      - github.com/pkoukk/tiktoken-go

  go-hclog:
    in:
      - github.com/hashicorp/go-hclog
  go-plugin:
    in:
      - github.com/hashicorp/go-plugin
      - github.com/hashicorp/go-plugin/**

  go-grpc:
    in:
      - google.golang.org/grpc
      - google.golang.org/grpc/**

  go-protobuf:
    in:
      - google.golang.org/protobuf
      - google.golang.org/protobuf/**

  go-term:
    in:
      - golang.org/x/term

  errgroup:
    in:
      - golang.org/x/sync/errgroup

components:
  # DOMAIN LAYER
  domain-workflow:
    in: domain/workflow

  domain-ports:
    in: domain/ports

  domain-errors:
    in: domain/errors

  domain-plugin:
    in: domain/pluginmodel

  domain-operation:
    in: domain/operation

  # PUBLIC PACKAGES
  pkg-expression:
    in: ../pkg/expression

  pkg-interpolation:
    in: ../pkg/interpolation

  pkg-plugin-sdk:
    in: ../pkg/plugin/sdk

  pkg-retry:
    in: ../pkg/retry

  pkg-stringutil:
    in: ../pkg/stringutil

  pkg-httpx:
    in: ../pkg/httpx

  pkg-output:
    in: ../pkg/output

  pkg-validation:
    in: ../pkg/validation

  # PROTOBUF
  proto-plugin:
    in: ../proto/plugin/v1

  # APPLICATION LAYER
  application:
    in: application

  # INFRASTRUCTURE LAYER
  infra-agents:
    in: infrastructure/agents

  infra-audit:
    in: infrastructure/audit

  infra-analyzer:
    in: infrastructure/analyzer

  infra-config:
    in: infrastructure/config

  infra-diagram:
    in: infrastructure/diagram

  infra-errors:
    in: infrastructure/errors

  infra-executor:
    in: infrastructure/executor

  infra-github:
    in: infrastructure/github

  infra-http:
    in: infrastructure/http

  infra-notify:
    in: infrastructure/notify

  infra-expression:
    in: infrastructure/expression

  infra-logger:
    in: infrastructure/logger

  infra-plugin:
    in: infrastructure/pluginmgr

  infra-repository:
    in: infrastructure/repository

  infra-store:
    in: infrastructure/store

  infra-tokenizer:
    in: infrastructure/tokenizer

  infra-xdg:
    in: infrastructure/xdg

  # INTERFACES LAYER
  interfaces-cli:
    in: interfaces/cli

  interfaces-cli-ui:
    in: interfaces/cli/ui

  # TEST UTILITIES
  testutil:
    in: testutil
  testutil-mocks:
    in: testutil/mocks
  testutil-builders:
    in: testutil/builders
  testutil-fixtures:
    in: testutil/fixtures

deps:
  # DOMAIN — only stdlib (+ pkg via commonComponents)
  domain-workflow:
    canUse:
      - go-stdlib
      - go-sync
  domain-ports:
    mayDependOn:
      - domain-workflow
      - domain-errors
      - domain-plugin
      - domain-operation
    canUse:
      - go-stdlib
  domain-errors:
    canUse:
      - go-stdlib
  domain-plugin:
    canUse:
      - go-stdlib
  domain-operation:
    mayDependOn:
      - domain-plugin
      - domain-ports
    canUse:
      - go-stdlib

  # PROTOBUF
  proto-plugin:
    canUse:
      - go-stdlib
      - go-protobuf

  # APPLICATION — domain only (NO infrastructure)
  application:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
      - domain-plugin
      - domain-operation
    canUse:
      - go-stdlib
      - go-sync
      - uuid

  # INFRASTRUCTURE — domain + vendors
  infra-agents:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
      - domain-plugin
      - infra-logger
    canUse:
      - go-stdlib
      - go-sync
      - zap
      - yaml
      - uuid

  infra-audit:
    mayDependOn:
      - domain-workflow
      - domain-ports
    canUse:
      - go-stdlib

  infra-analyzer:
    mayDependOn:
      - domain-workflow
      - domain-ports
    canUse:
      - go-stdlib

  infra-config:
    mayDependOn:
      - domain-workflow
      - domain-ports
    canUse:
      - go-stdlib
      - yaml
      - zap

  infra-diagram:
    mayDependOn:
      - domain-workflow
      - domain-ports
    canUse:
      - go-stdlib

  infra-errors:
    mayDependOn:
      - domain-errors
      - domain-workflow
      - domain-ports
    canUse:
      - go-stdlib
      - color

  infra-executor:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
      - infra-logger
    canUse:
      - go-stdlib
      - go-sync

  infra-github:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
      - domain-plugin
      - infra-logger
    canUse:
      - go-stdlib
      - go-sync

  infra-http:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
      - domain-plugin
      - infra-logger
    canUse:
      - go-stdlib
      - go-sync

  infra-notify:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
      - domain-plugin
      - infra-logger
    canUse:
      - go-stdlib
      - go-sync

  infra-expression:
    mayDependOn:
      - domain-workflow
      - domain-ports
    canUse:
      - go-stdlib
      - expr

  infra-logger:
    mayDependOn:
      - domain-ports
    canUse:
      - go-stdlib
      - zap
      - color

  infra-plugin:
    mayDependOn:
      - domain-plugin
      - domain-operation
      - domain-ports
      - domain-errors
      - proto-plugin
      - pkg-httpx
    canUse:
      - go-stdlib
      - yaml
      - go-hclog
      - go-plugin
      - go-grpc
      - go-protobuf

  infra-repository:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
      - infra-expression
    canUse:
      - go-stdlib
      - yaml

  infra-store:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
    canUse:
      - go-stdlib
      - sqlite

  infra-tokenizer:
    mayDependOn:
      - domain-workflow
      - domain-ports
    canUse:
      - go-stdlib
      - tiktoken

  infra-xdg:
    canUse:
      - go-stdlib

  # INTERFACES — wiring layer (app + infra + domain)
  interfaces-cli:
    mayDependOn:
      - application
      - domain-workflow
      - domain-ports
      - domain-errors
      - domain-plugin
      - domain-operation
      - infra-agents
      - infra-audit
      - infra-analyzer
      - infra-config
      - infra-diagram
      - infra-errors
      - infra-executor
      - infra-expression
      - infra-github
      - infra-http
      - infra-logger
      - infra-notify
      - infra-plugin
      - infra-repository
      - infra-store
      - infra-tokenizer
      - infra-xdg
      - interfaces-cli-ui
    canUse:
      - go-stdlib
      - go-sync
      - cobra
      - yaml
      - zap
      - color
      - uuid
      - progressbar
      - go-term

  interfaces-cli-ui:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
      - infra-errors
    canUse:
      - go-stdlib
      - color
      - progressbar
      - zap

  # TESTUTIL — test helpers (can depend on domain + some infra)
  testutil-mocks:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-errors
      - domain-plugin
      - domain-operation
    canUse:
      - go-stdlib
      - go-sync
      - testify
  testutil-builders:
    mayDependOn:
      - domain-workflow
      - domain-ports
      - domain-plugin
      - domain-operation
      - application
      - testutil-mocks
    canUse:
      - go-stdlib
      - go-sync
      - testify
  testutil:
    canUse:
      - go-stdlib
  testutil-fixtures:
    mayDependOn:
      - domain-workflow
    canUse:
      - go-stdlib
      - testify
      - yaml
