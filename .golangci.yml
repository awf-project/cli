# golangci-lint v2 configuration for AWF (AI Workflow CLI)
# Hexagonal architecture with Cobra CLI

version: "2"

run:
  timeout: 5m
  go: "1.24"

linters:
  default: none
  enable:
    # Core quality (bugs)
    - errcheck      # Unhandled errors
    - govet         # Official analyzer
    - staticcheck   # Includes gosimple, stylecheck
    - ineffassign   # Wasted assignments
    - unused        # Dead code

    # Readability
    - misspell      # Typos in comments
    - revive        # Replaces golint

    # Error handling
    - errorlint     # %w wrapping, errors.Is/As

    # Security
    - gosec         # Security audit

    # Architecture
    - depguard      # Dependency constraints

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - (io.Writer).Write
        - (*go.uber.org/zap.Logger).Sync
        - syscall.Flock
        - syscall.Kill
        - os.Getwd
        - os.Hostname
        - os.UserHomeDir
        - encoding/json.Marshal
        - time.Parse

    govet:
      enable-all: true
      disable:
        - fieldalignment  # Micro-optimization

    staticcheck:
      checks:
        - all

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
          disabled: true  # Not needed for internal packages
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    gosec:
      excludes:
        - G204  # Subprocess launched with variable - intentional for shell executor
        - G304  # File path from variable - intentional for workflow files

    depguard:
      rules:
        domain-purity:
          list-mode: lax
          files:
            - "**/internal/domain/**/*.go"
          deny:
            - pkg: github.com/spf13/cobra
              desc: Domain must not depend on CLI framework
            - pkg: go.uber.org/zap
              desc: Domain must not depend on concrete logger
            - pkg: github.com/fatih/color
              desc: Domain must not depend on UI components
            - pkg: github.com/schollz/progressbar/v3
              desc: Domain must not depend on UI components

    misspell:
      locale: US
      ignore-rules:
        - cancelled  # Used in API: StatusCancelled, CancelledCount
        - cancelling # User-facing messages

  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    rules:
      # CLI commands can be complex
      - path: internal/interfaces/cli/
        linters:
          - funlen
          - gocyclo

      # Table-driven tests get long
      - path: _test\.go
        linters:
          - funlen
          - dupl

      # Main can have init
      - path: cmd/
        linters:
          - gochecknoinits

      # Allow dot imports in tests for testify
      - path: _test\.go
        text: dot-imports
        linters:
          - revive

      # Struct initialization in tests often has "unused" writes
      # Shadow vars in tests are common and acceptable
      # Error handling patterns in tests are simpler
      - path: _test\.go
        text: "unusedwrite|shadow"
        linters:
          - govet
      - path: _test\.go
        linters:
          - errorlint
          - errcheck

      # Relaxed permissions and error handling in tests
      - path: _test\.go
        text: "G104|G301|G302|G306"
        linters:
          - gosec

      # Weak random is OK for retry jitter (not crypto)
      - path: pkg/retry/
        text: G404
        linters:
          - gosec

      # CLI tool uses standard Unix permissions
      # 0755 for directories, 0644 for files are deliberate
      - path: internal/infrastructure/(logger|store)/
        text: "G301|G302"
        linters:
          - gosec
      - path: internal/interfaces/cli/init\.go
        text: "G301|G306"
        linters:
          - gosec

      # Compile-time type assertions (var _ Interface = (*Type)(nil))
      - text: "Error return value is not checked"
        source: "var _ .* = \\(\\*.*\\)\\(nil\\)"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
  sort-order:
    - file
    - linter
