syntax = "proto3";

package plugin.v1;

option go_package = "github.com/awf-project/cli/proto/plugin/v1;pluginv1";

service PluginService {
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  rpc Init(InitRequest) returns (InitResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

service OperationService {
  rpc ListOperations(ListOperationsRequest) returns (ListOperationsResponse);
  rpc GetOperation(GetOperationRequest) returns (GetOperationResponse);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
}

service ValidatorService {
  rpc ValidateWorkflow(ValidateWorkflowRequest) returns (ValidateWorkflowResponse);
  rpc ValidateStep(ValidateStepRequest) returns (ValidateStepResponse);
}

service StepTypeService {
  rpc ListStepTypes(ListStepTypesRequest) returns (ListStepTypesResponse);
  rpc ExecuteStep(ExecuteStepRequest) returns (ExecuteStepResponse);
}

message GetInfoRequest {}

message GetInfoResponse {
  string name = 1;
  string version = 2;
  string description = 3;
  repeated string capabilities = 4;
}

message InitRequest {
  map<string, bytes> config = 1;
}

message InitResponse {}

message ShutdownRequest {}

message ShutdownResponse {}

message ListOperationsRequest {}

message ListOperationsResponse {
  repeated OperationSchema operations = 1;
}

message GetOperationRequest {
  string name = 1;
}

message GetOperationResponse {
  OperationSchema operation = 1;
}

message ExecuteRequest {
  string operation = 1;
  map<string, bytes> inputs = 2;
}

message ExecuteResponse {
  bool success = 1;
  string output = 2;
  map<string, bytes> data = 3;
  string error = 4;
}

message OperationSchema {
  string name = 1;
  string description = 2;
  repeated InputSchema inputs = 3;
  repeated OutputSchema outputs = 4;
}

message InputSchema {
  string name = 1;
  string type = 2;
  bool required = 3;
  string default = 4;
  string description = 5;
  string validation = 6;
}

message OutputSchema {
  string name = 1;
  string type = 2;
  string description = 3;
}

// Severity of a validation issue.
// SEVERITY_UNSPECIFIED (proto3 zero value) is treated as ERROR by the host.
enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_WARNING = 1;
  SEVERITY_ERROR = 2;
  SEVERITY_INFO = 3;
}

message ValidationIssue {
  Severity severity = 1;
  string message = 2;
  string step = 3;
  string field = 4;
}

message ValidateWorkflowRequest {
  bytes workflow_json = 1;
}

message ValidateWorkflowResponse {
  repeated ValidationIssue issues = 1;
}

message ValidateStepRequest {
  bytes workflow_json = 1;
  string step_name = 2;
}

message ValidateStepResponse {
  repeated ValidationIssue issues = 1;
}

message ListStepTypesRequest {}

message StepTypeInfo {
  string name = 1;
  string description = 2;
}

message ListStepTypesResponse {
  repeated StepTypeInfo step_types = 1;
}

message ExecuteStepRequest {
  string step_name = 1;
  string step_type = 2;
  bytes config = 3;
  bytes inputs = 4;
}

message ExecuteStepResponse {
  string output = 1;
  bytes data = 2;
  int32 exit_code = 3;
}
