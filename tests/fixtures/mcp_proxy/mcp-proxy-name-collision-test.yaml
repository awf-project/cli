name: mcp-proxy-name-collision-test
version: "1.0.0"
author: test
states:
  initial: start
  start:
    type: agent
    provider: claude
    prompt: "Test prompt"
    on_success: end
    mcp_proxy:
      enable: true
      plugin_tools:
        - plugin: kubernetes
          expose:
            - kubectl_apply
        - plugin: kubernetes
          expose:
            - kubectl_get
  end:
    type: terminal
    status: success
    message: "Done"
