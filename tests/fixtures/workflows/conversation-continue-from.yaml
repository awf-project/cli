# Feature: F074 — accept valid continue_from with existing step reference
name: conversation-continue-from
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task for the agent to work on"

states:
  initial: analyze

  analyze:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: |
      You are a helpful assistant. Analyze the request and provide insights.
    initial_prompt: |
      Please analyze this:
      {{inputs.task}}
    options:
      model: claude-haiku-4-5
    conversation:
      max_turns: 3
      max_context_tokens: 50000
      strategy: sliding_window
    timeout: 60
    on_success: refine
    on_failure: error

  refine:
    type: agent
    provider: claude
    mode: conversation
    prompt: |
      Now please refine and improve your previous response.
    conversation:
      max_turns: 2
      continue_from: analyze
    timeout: 60
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
