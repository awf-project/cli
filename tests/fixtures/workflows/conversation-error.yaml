# Feature: F033
# Error handling in conversation mode with hooks and retry
name: conversation-error
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task description for conversation"

states:
  initial: conversation_with_retry

  conversation_with_retry:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "You are a reliable assistant. Complete tasks thoroughly."
    initial_prompt: "Execute: {{inputs.task}}"
    options:
      model: claude-haiku-4-5
      max_tokens: 1500
    conversation:
      max_turns: 5
      max_context_tokens: 40000
      strategy: sliding_window
      stop_condition: "response contains 'SUCCESS'"
    timeout: 45
    retry:
      max_attempts: 3
      delay: 2s
      backoff: exponential
    hooks:
      pre:
        - command: echo "Starting conversation attempt"
      post:
        - command: echo "Conversation completed"
      error:
        - command: echo "Conversation failed: {{error.message}}"
        - log: "Error occurred in conversation step"
    on_success: conversation_with_error_transition
    on_failure: handle_failure

  conversation_with_error_transition:
    type: agent
    provider: gemini
    mode: conversation
    system_prompt: "Process with caution."
    initial_prompt: "Continue from: {{states.conversation_with_retry.Output}}"
    options:
      model: gemini-pro
    conversation:
      max_turns: 3
      strategy: sliding_window
    timeout: 30
    on_success: done
    on_failure: handle_failure
    on_error:
      provider_timeout: timeout_recovery
      invalid_response: response_recovery

  timeout_recovery:
    type: agent
    provider: codex
    mode: conversation
    system_prompt: "Provide quick response."
    initial_prompt: "Recover from timeout for: {{inputs.task}}"
    conversation:
      max_turns: 2
      strategy: sliding_window
    timeout: 20
    on_success: done
    on_failure: handle_failure

  response_recovery:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "Handle invalid responses gracefully."
    initial_prompt: "Retry with: {{inputs.task}}"
    options:
      model: claude-haiku-4-5
    conversation:
      max_turns: 3
      strategy: sliding_window
      stop_condition: "turn_count >= 2"
    timeout: 30
    on_success: done
    on_failure: handle_failure

  handle_failure:
    type: step
    command: |
      echo "Workflow failed at conversation step"
      echo "Error details: {{error.message}}"
      exit 1
    on_success: error
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
