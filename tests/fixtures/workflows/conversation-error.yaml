# Feature: F033
# Error handling in conversation mode with hooks and retry
#
# NOTE: `on_error` mapping is NOT YET IMPLEMENTED.
# Only on_success and on_failure transitions are supported.
name: conversation-error
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task description for conversation"

states:
  initial: conversation_with_retry

  # Test: Conversation with retry on failure
  conversation_with_retry:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "You are a reliable assistant. Say SUCCESS when task is complete."
    prompt: "Execute: {{.inputs.task}}"
    options:
      model: claude-sonnet-4-20250514
      max_tokens: 1500
    conversation:
      max_turns: 5
      max_context_tokens: 40000
      strategy: sliding_window
      stop_condition: "inputs.response contains 'SUCCESS'"
    timeout: 45
    retry:
      max_attempts: 3
      delay: 2s
      backoff: exponential
    hooks:
      pre:
        - command: echo "Starting conversation attempt"
      post:
        - command: echo "Conversation completed"
      error:
        - command: echo "Conversation failed"
    on_success: conversation_chained
    on_failure: handle_failure

  # Test: Chained conversation using previous output
  conversation_chained:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "Process carefully."
    prompt: "Continue from: {{.states.conversation_with_retry.Output}}"
    options:
      model: claude-sonnet-4-20250514
    conversation:
      max_turns: 3
      strategy: sliding_window
      stop_condition: "inputs.turn_count >= 2"
    timeout: 30
    on_success: done
    on_failure: handle_failure

  handle_failure:
    type: step
    command: |
      echo "Workflow failed at conversation step"
      exit 1
    on_success: error
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
