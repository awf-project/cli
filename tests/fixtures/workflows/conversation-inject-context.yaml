# Feature: F075 — inject_context field in conversation mode
name: conversation-inject-context
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true

states:
  initial: chat

  chat:
    type: agent
    provider: claude
    mode: conversation
    initial_prompt: "{{inputs.task}}"
    conversation:
      max_turns: 5
      inject_context: "Additional context for the conversation"
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
