# Feature: F075 — inject_context removed in F083
# This fixture now tests basic conversation mode
name: conversation-inject-context
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true

states:
  initial: chat

  chat:
    type: agent
    provider: claude
    mode: conversation
    prompt: "{{inputs.task}}"
    conversation: {}
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
