# Feature: F074 — reject invalid continue_from with nonexistent step reference
name: conversation-invalid-continue-from
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task for the agent to work on"

states:
  initial: analyze

  analyze:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: |
      You are a helpful assistant. Analyze the request and provide insights.
    prompt: |
      Please analyze this:
      {{inputs.task}}
    options:
      model: claude-haiku-4-5
    conversation: {}
    timeout: 60
    on_success: done
    on_failure: error

  refine:
    type: agent
    provider: claude
    mode: conversation
    prompt: |
      Now please refine your analysis.
    conversation:
      continue_from: nonexistent_step
    timeout: 60
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
