# Feature: C062 — reject truncate_middle strategy (not yet implemented)
name: conversation-invalid-truncate-middle
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true

states:
  initial: chat

  chat:
    type: agent
    provider: claude
    mode: conversation
    initial_prompt: "{{inputs.task}}"
    conversation:
      max_turns: 5
      strategy: truncate_middle
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
