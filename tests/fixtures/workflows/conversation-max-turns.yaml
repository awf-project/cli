# Feature: F033
# Conversation mode steps with various providers
name: conversation-max-turns
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task description for conversation"

states:
  initial: single_turn

  single_turn:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "Answer briefly."
    prompt: "{{inputs.task}}"
    options:
      model: claude-haiku-4-5
    conversation: {}
    timeout: 30
    on_success: zero_max_turns
    on_failure: error

  zero_max_turns:
    type: agent
    provider: gemini
    mode: conversation
    system_prompt: "Provide insights."
    prompt: "Elaborate on: {{inputs.task}}"
    options:
      model: gemini-pro
    conversation: {}
    timeout: 45
    on_success: high_turn_limit
    on_failure: error

  high_turn_limit:
    type: agent
    provider: codex
    mode: conversation
    system_prompt: "Discuss thoroughly."
    prompt: "Deep dive: {{inputs.task}}"
    conversation: {}
    timeout: 180
    on_success: no_max_turns_specified
    on_failure: error

  no_max_turns_specified:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "Continue until satisfied."
    prompt: "Final thoughts: {{inputs.task}}"
    options:
      model: claude-haiku-4-5
    conversation: {}
    timeout: 60
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
