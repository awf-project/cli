# Feature: F033
# Multi-turn conversation demonstration
#
# NOTE: This fixture tests basic multi-turn execution.
# The `continue_from` feature is NOT YET IMPLEMENTED - it's documented for future use.
# Currently each conversation step starts fresh without inheriting history.
name: conversation-multiturn
version: "1.0.0"

inputs:
  - name: initial_request
    type: string
    required: true
    description: "Initial request for the agent"

states:
  initial: first_turn

  first_turn:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: |
      You are a helpful assistant. Provide clear responses.
    prompt: |
      {{.inputs.initial_request}}
    options:
      model: claude-sonnet-4-20250514
      max_tokens: 2000
    conversation:
      max_turns: 3
      max_context_tokens: 80000
      strategy: sliding_window
    timeout: 60
    on_success: second_turn
    on_failure: error

  # NOTE: continue_from is NOT IMPLEMENTED yet
  # This step currently starts a new conversation, not continuing from first_turn
  second_turn:
    type: agent
    provider: claude
    mode: conversation
    # continue_from: first_turn  # NOT IMPLEMENTED - commented out
    system_prompt: |
      You are a helpful assistant. Continue the conversation.
    prompt: |
      Can you elaborate on your previous response?
    conversation:
      max_turns: 2
      stop_condition: "inputs.turn_count >= 2"
    timeout: 60
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
