# Feature: F033
# Parallel conversation steps with multiple providers
#
# NOTE: Each parallel branch runs an independent conversation.
# Conversation history is NOT shared between branches.
name: conversation-parallel
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task description for conversation"

states:
  initial: parallel_conversations

  parallel_conversations:
    type: parallel
    strategy: all_succeed
    branches:
      - name: claude_research
        steps:
          - name: claude_convo
            type: agent
            provider: claude
            mode: conversation
            system_prompt: "You are a research assistant. Say RESEARCH COMPLETE when done."
            prompt: "Research: {{.inputs.task}}"
            options:
              model: claude-sonnet-4-20250514
              max_tokens: 2000
            conversation:
              max_turns: 5
              max_context_tokens: 60000
              strategy: sliding_window
              stop_condition: "inputs.response contains 'RESEARCH COMPLETE'"
            timeout: 90
            on_success: done

      - name: analysis_branch
        steps:
          - name: analysis_convo
            type: agent
            provider: claude
            mode: conversation
            system_prompt: "You are an analyst. Provide detailed analysis."
            prompt: "Analyze: {{.inputs.task}}"
            options:
              model: claude-sonnet-4-20250514
            conversation:
              max_turns: 5
              max_context_tokens: 50000
              strategy: sliding_window
              stop_condition: "inputs.turn_count >= 3"
            timeout: 90
            on_success: done

    on_success: synthesize
    on_failure: error

  synthesize:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "You are a synthesis expert. Say SYNTHESIS COMPLETE when done."
    prompt: |
      Synthesize these research findings:

      Research: {{.states.parallel_conversations.branches.claude_research.steps.claude_convo.output}}

      Analysis: {{.states.parallel_conversations.branches.analysis_branch.steps.analysis_convo.output}}
    options:
      model: claude-sonnet-4-20250514
      max_tokens: 3000
    conversation:
      max_turns: 3
      strategy: sliding_window
      stop_condition: "inputs.response contains 'SYNTHESIS COMPLETE'"
    timeout: 60
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
