# Feature: F033
# Parallel conversation steps with multiple providers
name: conversation-parallel
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task description for conversation"

states:
  initial: parallel_conversations

  parallel_conversations:
    type: parallel
    strategy: all_succeed
    parallel:
      - claude_convo
      - gemini_convo
      - codex_convo
    on_success: synthesize
    on_failure: error

  claude_convo:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "You are a research assistant specializing in technical analysis."
    prompt: "Research: {{inputs.task}}"
    options:
      model: claude-haiku-4-5
    conversation: {}
    timeout: 90
    on_success: done

  gemini_convo:
    type: agent
    provider: gemini
    mode: conversation
    system_prompt: "You are a research assistant focusing on practical applications."
    prompt: "Investigate: {{inputs.task}}"
    options:
      model: gemini-pro
    conversation: {}
    timeout: 90
    on_success: done

  codex_convo:
    type: agent
    provider: codex
    mode: conversation
    system_prompt: "You are a research assistant emphasizing code examples."
    prompt: "Analyze: {{inputs.task}}"
    conversation: {}
    timeout: 90
    on_success: done

  synthesize:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "You are a synthesis expert. Combine insights from multiple sources."
    prompt: |
      Synthesize these research findings:

      Claude findings: {{states.claude_convo.output}}

      Gemini findings: {{states.gemini_convo.output}}

      Codex findings: {{states.codex_convo.output}}
    options:
      model: claude-haiku-4-5
    conversation: {}
    timeout: 60
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
