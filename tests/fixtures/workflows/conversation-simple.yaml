# Feature: F033
# Basic conversation mode with single agent step
name: conversation-simple
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task for the agent to work on"

states:
  initial: review

  review:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: |
      You are a helpful assistant. Provide clear and concise responses.
      Say "COMPLETE" when the task is finished.
    prompt: |
      Please help with this task:
      {{inputs.task}}
    options:
      model: claude-haiku-4-5
    conversation: {}
    timeout: 60
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
