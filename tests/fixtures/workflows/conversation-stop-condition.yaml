# Feature: F033
# Conversation mode steps with various providers
name: conversation-stop-condition
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task description for conversation"

states:
  initial: keyword_match

  keyword_match:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: |
      You are a task executor. Complete the task and respond with "COMPLETE" when done.
    prompt: "Execute: {{inputs.task}}"
    options:
      model: claude-haiku-4-5
    conversation: {}
    timeout: 60
    on_success: turn_count_limit
    on_failure: error

  turn_count_limit:
    type: agent
    provider: gemini
    mode: conversation
    system_prompt: "Provide brief answers."
    prompt: "Continue task: {{inputs.task}}"
    options:
      model: gemini-pro
    conversation: {}
    timeout: 60
    on_success: token_budget
    on_failure: error

  token_budget:
    type: agent
    provider: codex
    mode: conversation
    system_prompt: "Be concise."
    prompt: "Finalize: {{inputs.task}}"
    conversation: {}
    timeout: 60
    on_success: complex_expression
    on_failure: error

  complex_expression:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "Respond thoughtfully."
    prompt: "Analyze: {{inputs.task}}"
    options:
      model: claude-haiku-4-5
    conversation: {}
    timeout: 90
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
