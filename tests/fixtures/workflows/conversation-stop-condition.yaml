# Feature: F033
# Stop conditions testing with various expression types
#
# Stop condition variables available:
#   - inputs.response: Last assistant response text
#   - inputs.turn_count: Number of completed turns
#   - inputs.total_tokens: Total tokens used (if tracked)
name: conversation-stop-condition
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task description for conversation"

states:
  initial: keyword_match

  # Test: Stop when response contains keyword
  keyword_match:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: |
      You are a task executor. Complete the task and respond with "COMPLETE" when done.
    prompt: "Execute: {{.inputs.task}}"
    options:
      model: claude-sonnet-4-20250514
      max_tokens: 1500
    conversation:
      max_turns: 10
      strategy: sliding_window
      stop_condition: "inputs.response contains 'COMPLETE'"
    timeout: 60
    on_success: turn_count_limit
    on_failure: error

  # Test: Stop after N turns
  turn_count_limit:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "Provide brief answers."
    prompt: "Continue task: {{.inputs.task}}"
    options:
      model: claude-sonnet-4-20250514
    conversation:
      max_turns: 5
      strategy: sliding_window
      stop_condition: "inputs.turn_count >= 3"
    timeout: 60
    on_success: complex_expression
    on_failure: error

  # Test: Complex boolean expression
  complex_expression:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "Respond thoughtfully. Say DONE when complete."
    prompt: "Analyze: {{.inputs.task}}"
    options:
      model: claude-sonnet-4-20250514
    conversation:
      max_turns: 15
      strategy: sliding_window
      stop_condition: "(inputs.turn_count >= 5 && inputs.response contains 'DONE') || inputs.turn_count >= 10"
    timeout: 90
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
