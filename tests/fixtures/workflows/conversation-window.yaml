# Feature: F033
# Context window management testing
#
# NOTE: Only `sliding_window` strategy is currently implemented.
# Strategies `summarize` and `truncate_middle` are NOT YET IMPLEMENTED.
name: conversation-window
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task description for conversation"

states:
  initial: sliding_window_test

  # Test: sliding_window strategy (IMPLEMENTED)
  # When max_context_tokens is reached, oldest turns are dropped
  sliding_window_test:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "You are a helpful assistant. Engage in detailed conversation."
    prompt: "Let's discuss: {{.inputs.task}}"
    options:
      model: claude-sonnet-4-20250514
      max_tokens: 1000
    conversation:
      max_turns: 10
      max_context_tokens: 10000
      strategy: sliding_window
      stop_condition: "inputs.turn_count >= 3"
    timeout: 120
    on_success: small_window_test
    on_failure: error

  # Test: Very small context window to trigger truncation
  small_window_test:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "Be concise."
    prompt: "Brief summary of: {{.inputs.task}}"
    options:
      model: claude-sonnet-4-20250514
    conversation:
      max_turns: 5
      max_context_tokens: 2000  # Small window to force truncation
      strategy: sliding_window
      stop_condition: "inputs.turn_count >= 2"
    timeout: 60
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
