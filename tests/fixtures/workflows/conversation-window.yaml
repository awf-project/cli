# Feature: F033
# Context window management with different strategies
name: conversation-window
version: "1.0.0"

inputs:
  - name: task
    type: string
    required: true
    description: "Task description for conversation"

states:
  initial: sliding_window_test

  sliding_window_test:
    type: agent
    provider: claude
    mode: conversation
    system_prompt: "You are a helpful assistant. Engage in detailed conversation."
    initial_prompt: "Let's discuss: {{inputs.task}}"
    options:
      model: claude-haiku-4-5
    conversation:
      max_turns: 20
      max_context_tokens: 10000
      strategy: sliding_window
    timeout: 120
    on_success: summarize_test
    on_failure: error

  summarize_test:
    type: agent
    provider: gemini
    mode: conversation
    system_prompt: "You are a concise summarizer."
    initial_prompt: "Summarize previous discussion on {{inputs.task}}"
    options:
      model: gemini-pro
    conversation:
      max_turns: 5
      max_context_tokens: 50000
      strategy: sliding_window
    timeout: 60
    on_success: truncate_middle_test
    on_failure: error

  truncate_middle_test:
    type: agent
    provider: codex
    mode: conversation
    system_prompt: "You are a technical expert."
    initial_prompt: "Final analysis of {{inputs.task}}"
    conversation:
      max_turns: 10
      max_context_tokens: 20000
      strategy: sliding_window
    timeout: 60
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
