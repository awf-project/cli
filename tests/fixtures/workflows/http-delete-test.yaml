# Feature: F058 - HTTP Operation Integration Test Fixture
# This workflow tests HTTP DELETE operation

name: http-delete-test
version: "1.0"

inputs:
  - name: url
    type: string
    required: true
  - name: method
    type: string
    required: true

states:
  initial: delete_resource

  delete_resource:
    type: operation
    operation: http.request
    inputs:
      method: "{{inputs.method}}"
      url: "{{inputs.url}}"
    on_success: success
    on_failure: success

  success:
    type: terminal
    status: success
