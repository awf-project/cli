name: test-loop-simple
version: "1.0.0"

states:
  initial: loop_items
  loop_items:
    type: for_each
    items: '[{"name":"S1"},{"name":"S2"}]'
    body:
      - echo_item
    on_complete: done
  echo_item:
    type: step
    command: 'echo "Item: {{.loop.Item}}"'
    on_success: loop_items
  done:
    type: terminal
    status: success
