name: test
version: "1.0.0"

states:
  initial: step1

  step1:
    type: step
    command: echo "test"
    on_success: step2
    on_failure: error

  step2:
    type: step
    when: 'error.Message != ""'
    command: echo "test"
    on_success: done
    on_failure: error

  done:
    type: terminal
    status: success

  error:
    type: terminal
    status: failure
