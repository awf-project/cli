name: workflow-with-hooks
description: A workflow with all hook types and capture
version: "1.0.0"

hooks:
  workflow_start:
    - command: echo "WORKFLOW_START"
  workflow_end:
    - command: echo "WORKFLOW_END"
  workflow_error:
    - command: echo "WORKFLOW_ERROR"
  workflow_cancel:
    - command: echo "WORKFLOW_CANCELLED"
    - log: "Workflow was cancelled by user"

states:
  initial: step1
  step1:
    type: step
    command: echo "main command output"
    capture:
      stdout: step1_output
      max_size: 1MB
    hooks:
      pre:
        - command: echo "PRE_STEP1"
      post:
        - command: echo "POST_STEP1"
    on_success: done
    on_failure: error
  done:
    type: terminal
  error:
    type: terminal
